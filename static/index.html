        const values = seriesData.values || [];

        // 1. Series + Trend chart
        const seriesCtx = document.getElementById('ts-series-chart');
        if (seriesCtx && values.length > 0) {
            const datasets = [
                { label: res.target_column, data: values, borderColor: '#3B82F6', backgroundColor: 'rgba(59,130,246,0.08)', borderWidth: 1.5, pointRadius: 0, fill: true, tension: 0.1, order: 2 },
            ];
            if (trend.trend_line && trend.trend_line.length > 0) {
                datasets.push({ label: 'Trend', data: trend.trend_line, borderColor: '#EF4444', borderWidth: 2, borderDash: [6, 3], pointRadius: 0, fill: false, order: 1 });
            }
            const rmean = (res.rolling_stats || {}).rolling_mean;
            if (rmean && rmean.length > 0) {
                datasets.push({ label: `Hareketli Ort. (${(res.rolling_stats || {}).window || '?'})`, data: rmean, borderColor: '#F59E0B', borderWidth: 1.5, borderDash: [3, 2], pointRadius: 0, fill: false, order: 1 });
            }
            chartInstances['ts-series'] = new Chart(seriesCtx, {
                type: 'line',
                data: { labels: timestamps, datasets },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 20 } } }, scales: { x: { ticks: { maxTicksLimit: 12, font: { size: 10 } }, grid: { display: false } }, y: { grid: { color: '#F1F5F9' }, ticks: { font: { size: 10 } } } }, interaction: { mode: 'index', intersect: false } }
            });
        }

        // 2. ACF Chart
        const acfCtx = document.getElementById('ts-acf-chart');
        if (acfCtx && acf.acf_values && acf.acf_values.length > 1) {
            const lags = acf.acf_values.slice(1); // skip lag 0
            const lagLabels = lags.map((_, i) => i + 1);
            const confBand = acf.confidence_band || 0.1;
            const barColors = lags.map(v => Math.abs(v) > confBand ? 'rgba(59,130,246,0.8)' : 'rgba(203,213,225,0.6)');
            chartInstances['ts-acf'] = new Chart(acfCtx, {
                type: 'bar',
                data: { labels: lagLabels, datasets: [
                    { label: 'ACF', data: lags, backgroundColor: barColors, borderRadius: 2, barPercentage: 0.8 },
                ] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, annotation: {} },
                    scales: { x: { title: { display: true, text: 'Gecikme (Lag)', font: { size: 10 } }, ticks: { font: { size: 9 } }, grid: { display: false } }, y: { min: -1, max: 1, grid: { color: '#F1F5F9' }, ticks: { font: { size: 10 } } } } },
                plugins: [{
                    id: 'confLines',
                    afterDraw(chart) {
                        const { ctx: c, chartArea: a, scales: { y } } = chart;
                        c.save(); c.strokeStyle = '#3B82F6'; c.lineWidth = 1; c.setLineDash([5, 3]);
                        [confBand, -confBand].forEach(v => { const yp = y.getPixelForValue(v); c.beginPath(); c.moveTo(a.left, yp); c.lineTo(a.right, yp); c.stroke(); });
                        c.restore();
                    }
                }]
            });
        }

        // 3. Decomposition Charts
        if (decomp && timestamps.length > 0) {
            function decompChart(id, data, label, color) {
                const ctx = document.getElementById(id);
                if (!ctx || !data) return;
                chartInstances[id] = new Chart(ctx, {
                    type: 'line',
                    data: { labels: timestamps, datasets: [{ label, data, borderColor: color, borderWidth: 1.5, pointRadius: 0, fill: false, tension: 0.1, spanGaps: true }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top', labels: { font: { size: 10 }, boxWidth: 16 } } }, scales: { x: { ticks: { maxTicksLimit: 10, font: { size: 9 } }, grid: { display: false } }, y: { grid: { color: '#F1F5F9' }, ticks: { font: { size: 9 } } } } }
                });
            }
            decompChart('ts-decomp-trend', decomp.trend, 'Trend Bileşeni', '#3B82F6');
            decompChart('ts-decomp-season', decomp.seasonal, 'Mevsimsel Bileşen', '#8B5CF6');
            decompChart('ts-decomp-resid', decomp.residual, 'Kalıntı (Residual)', '#94A3B8');
        }
    }

    async function calculateCost(modelId, submodelName, inferenceTime, numColumns) {
        // Guard: clamp inference time and columns to sensible positive values
        inferenceTime = Math.max(parseFloat(inferenceTime) || 0.1, 0.01);
        numColumns = Math.max(parseInt(numColumns) || 1, 1);
        const rows = Math.max(parseInt(document.getElementById('cost-rows').value) || 1000, 1);
        const freq = document.getElementById('cost-freq').value;
        try {
            const res = await api('/api/cost-estimate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ inference_time_sec: inferenceTime, num_rows: rows, num_columns: numColumns, frequency: freq }) });
            const resultDiv = document.getElementById('cost-result');
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = `<div class="grid grid-cols-2 gap-4"><div class="p-4 rounded-xl bg-brand-50 border border-brand-200"><div class="text-slate-500 text-xs mb-1">Tahmini Aylık Maliyet</div><div class="text-3xl font-bold text-brand-700">$${res.total_monthly.toFixed(2)}</div></div><div class="p-4 rounded-xl bg-slate-50"><div class="text-slate-500 text-xs mb-1">Aylık Çalışma Sayısı</div><div class="text-2xl font-bold text-slate-800">${res.executions_per_month}</div><div class="text-slate-400 text-xs">${res.estimated_job_duration_sec}sn/iş · ${res.time_per_row_ms}ms/satır</div></div></div>`;
        } catch (err) { alert('Maliyet hesaplama hatası: ' + err.message); }
    }

    async function downloadExport(type, modelId, submodelName) {
        const url = `/api/models/${modelId}/export/${encodeURIComponent(submodelName)}/${type}`;
        try {
            const res = await fetch(url, { headers: authToken ? { 'Authorization': 'Bearer ' + authToken } : {} });
            if (res.ok) {
                const blob = await res.blob();
                const link = document.createElement('a');
                const disposition = res.headers.get('Content-Disposition') || '';
                const filenameMatch = disposition.match(/filename="([^"]+)"/);
                const contentType = res.headers.get('Content-Type') || '';
                const ext = contentType.includes('zip') ? 'zip' : 'sql';
                link.href = URL.createObjectURL(blob);
                link.download = filenameMatch ? filenameMatch[1] : `disaaktar_${type}.${ext}`;
                link.click();
                URL.revokeObjectURL(link.href);
            } else {
                const data = await res.json();
                alert(data.error || 'Dışa aktarma hatası');
            }
        } catch (err) { alert('Dışa aktarma hatası: ' + err.message); }
    }

    async function downloadCallAnalysisCSV(modelId) {
        const url = `/api/models/${modelId}/call-analysis/download-csv`;
        try {
            const res = await fetch(url, { headers: authToken ? { 'Authorization': 'Bearer ' + authToken } : {} });
            if (res.ok) {
                const blob = await res.blob();
                const link = document.createElement('a');
                const disposition = res.headers.get('Content-Disposition') || '';
                const filenameMatch = disposition.match(/filename="([^"]+)"/);
                link.href = URL.createObjectURL(blob);
                link.download = filenameMatch ? filenameMatch[1] : `sonuclar_${modelId.substring(0,8)}.csv`;
                link.click();
                URL.revokeObjectURL(link.href);
            } else {
                const data = await res.json();
                alert(data.error || 'CSV indirme hatası');
            }
        } catch (err) { alert('CSV indirme hatası: ' + err.message); }
    }

    async function deleteModel(modelId, modelName, redirectTo) {
        if (!confirm(`"${modelName}" modelini silmek istediğinize emin misiniz?\n\nBu işlem geri alınamaz. Model, tüm alt modeller ve eğitim verileri kalıcı olarak silinecektir.`)) return;
        try {
            const res = await api(`/api/models/${modelId}/delete`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
            if (res.error) { alert('Silme hatası: ' + res.error); return; }
            navigate(redirectTo || '/');
        } catch (err) { alert('Silme hatası: ' + err.message); }
    }

    async function createUser() {
        const username = document.getElementById('new-username').value.trim();
        const display_name = document.getElementById('new-displayname').value.trim();
        const password = document.getElementById('new-password').value;
        const role = document.getElementById('new-role').value;
        const msgDiv = document.getElementById('create-user-msg');

        const res = await api('/api/auth/register', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, display_name, password, role }),
        });

        msgDiv.classList.remove('hidden');
        if (res.success) {
            msgDiv.className = 'text-sm text-center text-brand-600';
            msgDiv.textContent = res.message;
            document.getElementById('new-username').value = '';
            document.getElementById('new-displayname').value = '';
            document.getElementById('new-password').value = '';
            setTimeout(() => renderAdmin(), 1000);
        } else {
            msgDiv.className = 'text-sm text-center text-danger-500';
            msgDiv.textContent = res.error;
        }
    }

    async function updateUserRole(username, role) {
        const res = await api('/api/users/update-role', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, role }),
        });
        if (res.error) alert(res.error);
    }
