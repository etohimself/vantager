<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tahmin Platformu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        slate: { 25: '#FCFCFD', 50: '#F8FAFC', 100: '#F1F5F9', 200: '#E2E8F0', 300: '#CBD5E1', 400: '#94A3B8', 500: '#64748B', 600: '#475569', 700: '#334155', 800: '#1E293B', 900: '#0F172A' },
                        brand: { 50: '#ECFDF5', 100: '#D1FAE5', 200: '#A7F3D0', 300: '#6EE7B7', 400: '#34D399', 500: '#10B981', 600: '#059669', 700: '#047857', 800: '#065F46', 900: '#064E3B' },
                        warn: { 400: '#FB923C', 500: '#F97316', 600: '#EA580C' },
                        danger: { 400: '#F87171', 500: '#EF4444', 600: '#DC2626' },
                        info: { 400: '#60A5FA', 500: '#3B82F6', 600: '#2563EB' },
                    }
                }
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F1F5F9; color: #1E293B; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #E2E8F0; }
        ::-webkit-scrollbar-thumb { background: #94A3B8; border-radius: 3px; }
        .card { background: #fff; border: 1px solid #CBD5E1; border-radius: 14px; transition: all 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
        .card:hover { border-color: #94A3B8; box-shadow: 0 4px 16px rgba(0,0,0,0.10); }
        .card-flat { background: #fff; border: 1px solid #CBD5E1; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
        .btn-primary { background: linear-gradient(135deg, #10B981, #059669); color: white; padding: 10px 24px; border-radius: 10px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; font-size: 14px; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(16, 185, 129, 0.35); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-secondary { background: #E2E8F0; color: #334155; padding: 10px 24px; border-radius: 10px; font-weight: 500; border: 1px solid #CBD5E1; cursor: pointer; transition: all 0.2s; font-size: 14px; }
        .btn-secondary:hover { background: #CBD5E1; color: #1E293B; }
        .btn-sm { padding: 6px 14px; font-size: 13px; border-radius: 8px; }
        .btn-export { background: #FFF7ED; color: #EA580C; border: 1px solid #FED7AA; }
        .btn-export:hover { background: #FFEDD5; }
        .btn-danger-sm { background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; padding: 6px 14px; font-size: 13px; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
        .btn-danger-sm:hover { background: #FEE2E2; }
        .tag { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .tag-green { background: #ECFDF5; color: #059669; }
        .tag-orange { background: #FFF7ED; color: #EA580C; }
        .tag-red { background: #FEF2F2; color: #DC2626; }
        .tag-gray { background: #F1F5F9; color: #64748B; }
        .tag-blue { background: #EFF6FF; color: #2563EB; }
        .tag-purple { background: #FAF5FF; color: #7C3AED; }
        .endorsed-badge { background: linear-gradient(135deg, #FEF3C7, #FDE68A); color: #92400E; border: 1px solid #FCD34D; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .input-field { background: #fff; border: 1px solid #CBD5E1; border-radius: 10px; padding: 10px 14px; color: #1E293B; font-size: 14px; width: 100%; outline: none; transition: border-color 0.2s; }
        .input-field:focus { border-color: #10B981; box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }
        select.input-field { appearance: none; background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2394A3B8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-position: right 10px center; background-repeat: no-repeat; background-size: 20px; padding-right: 36px; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #475569; font-weight: 700; padding: 12px 16px; text-align: left; border-bottom: 2px solid #CBD5E1; white-space: nowrap; background: #F1F5F9; }
        .data-table td { padding: 14px 16px; border-bottom: 1px solid #E2E8F0; vertical-align: middle; }
        .data-table tbody tr { transition: background 0.15s; cursor: pointer; }
        .data-table tbody tr:hover { background: #F0FDF4; }
        .data-table tbody tr:hover .row-name { color: #059669; }
        .fade-in { animation: fadeIn 0.35s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { width: 40px; height: 40px; border: 3px solid #E2E8F0; border-top-color: #10B981; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .upload-zone { border: 2px dashed #94A3B8; border-radius: 14px; padding: 48px; text-align: center; cursor: pointer; transition: all 0.2s; background: #F8FAFC; }
        .upload-zone:hover, .upload-zone.dragover { border-color: #10B981; background: #ECFDF5; }
        .nav-link { padding: 8px 16px; border-radius: 8px; color: #64748B; font-weight: 500; cursor: pointer; transition: all 0.15s; font-size: 14px; }
        .nav-link:hover { color: #1E293B; background: #F1F5F9; }
        .nav-link.active { color: #059669; background: #ECFDF5; }
        .progress-bar { height: 6px; background: #E2E8F0; border-radius: 3px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #10B981, #34D399); border-radius: 3px; transition: width 0.3s; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #ECFDF5 0%, #F8FAFC 50%, #EFF6FF 100%); }
        .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #94A3B8; margin-bottom: 12px; }
        .stat-card { background: #fff; border: 1px solid #CBD5E1; border-radius: 14px; padding: 20px; }
        .featured-card { background: linear-gradient(135deg, #ECFDF5, #fff); border: 1px solid #6EE7B7; border-radius: 14px; padding: 20px; }
        .custom-tooltip { position: relative; cursor: default; }
        .custom-tooltip::after { content: attr(data-tip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); padding: 6px 12px; background: #1E293B; color: #fff; font-size: 12px; line-height: 1.4; border-radius: 8px; max-width: 400px; width: max-content; word-wrap: break-word; white-space: normal; pointer-events: none; opacity: 0; visibility: hidden; transition: opacity 0.1s; z-index: 50; margin-bottom: 4px; }
        .custom-tooltip:hover::after { opacity: 1; visibility: visible; }
    </style>
</head>
<body class="min-h-screen">
    <nav id="main-nav" class="hidden bg-white sticky top-0 z-50 px-6 py-3 flex items-center justify-between" style="border-bottom: 1px solid #CBD5E1; box-shadow: 0 1px 4px rgba(0,0,0,0.07);">
        <div class="flex items-center gap-3 cursor-pointer" onclick="navigate('/')">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background: linear-gradient(135deg, #10B981, #059669);">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <span class="font-bold text-lg tracking-tight text-slate-800">Tahmin Platformu</span>
        </div>
        <div class="flex items-center gap-1" id="nav-links"></div>
        <div class="flex items-center gap-3" id="nav-user"></div>
    </nav>

    <main id="app" class="max-w-7xl mx-auto px-6 py-8"></main>

    <script>
    // ══════════════════════════════════════════════════════════
    //  SECURITY: HTML ESCAPING
    // ══════════════════════════════════════════════════════════
    function esc(str) {
        if (str === null || str === undefined) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    // Escape for use inside single-quoted JS strings within HTML onclick attributes.
    // Two-layer escaping: JS string escape first, then HTML entity encode for attribute safety.
    function escAttr(str) {
        if (str === null || str === undefined) return '';
        // Step 1: JS string escape (handles \, ', newlines)
        var s = String(str).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/\r/g,'\\r');
        // Step 2: HTML entity encode for safe embedding in HTML attributes
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function parseCSVLine(line) {
        const result = [];
        let current = '', inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (inQuotes) {
                if (ch === '"' && line[i+1] === '"') { current += '"'; i++; }
                else if (ch === '"') { inQuotes = false; }
                else { current += ch; }
            } else {
                if (ch === '"') { inQuotes = true; }
                else if (ch === ',') { result.push(current.trim()); current = ''; }
                else { current += ch; }
            }
        }
        result.push(current.trim());
        return result;
    }

    // ══════════════════════════════════════════════════════════
    //  STATE & AUTH
    // ══════════════════════════════════════════════════════════
    const API = '';
    let currentRoute = '/';
    let chartInstances = {};
    let currentUser = null;
    let authToken = localStorage.getItem('authToken') || null;
    let _pollTimers = [];
    let _audioObjectURLs = [];

    async function api(path, opts = {}) {
        const headers = opts.headers || {};
        if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
        opts.headers = headers;
        let res;
        try {
            res = await fetch(API + path, opts);
        } catch (e) {
            return { error: 'Sunucuya bağlanılamadı. Lütfen internet bağlantınızı kontrol edin.' };
        }
        if (res.status === 401 && path !== '/api/auth/me' && path !== '/api/auth/login') {
            currentUser = null;
            authToken = null;
            localStorage.removeItem('authToken');
            renderLogin();
            return { error: 'Oturum süreniz doldu, lütfen tekrar giriş yapın.' };
        }
        if (opts.raw) return res;
        try {
            return await res.json();
        } catch (e) {
            return { error: 'Sunucu yanıtı geçersiz' };
        }
    }

    async function checkAuth() {
        if (!authToken) return false;
        const res = await api('/api/auth/me');
        if (res.authenticated) {
            currentUser = res.user;
            return true;
        }
        currentUser = null;
        authToken = null;
        localStorage.removeItem('authToken');
        return false;
    }

    function isAdmin() {
        return currentUser && (currentUser.role === 'admin' || currentUser.role === 'master_admin');
    }

    // ══════════════════════════════════════════════════════════
    //  ROUTER
    // ══════════════════════════════════════════════════════════
    function navigate(path) { window.location.hash = '#' + path; }
    function getRoute() { return window.location.hash.slice(1) || '/'; }

    window.addEventListener('hashchange', () => router());
    window.addEventListener('load', async () => {
        const ok = await checkAuth();
        if (!ok) { renderLogin(); return; }
        showNav();
        router();
    });

    async function router() {
        if (!currentUser) { renderLogin(); return; }
        const path = getRoute();
        currentRoute = path;
        destroyCharts();
        updateNav(path);

        if (path === '/') return renderDashboard();
        if (path === '/library') return renderLibrary();
        if (path === '/train') return renderTrain();
        if (path === '/admin') return renderAdmin();
        if (path === '/settings') return renderSettings();

        let m;
        if (m = path.match(/^\/model\/([^/]+)\/results$/)) return renderResults(m[1]);
        if (m = path.match(/^\/model\/([^/]+)\/predict\/([^/]+)$/)) return renderSubmodelPredict(m[1], m[2]);
        if (m = path.match(/^\/model\/([^/]+)\/predict-audio$/)) return renderAudioPredict(m[1]);
        if (m = path.match(/^\/model\/([^/]+)\/export\/([^/]+)$/)) return renderExport(m[1], m[2]);

        renderNotFound();
    }

    function showNav() {
        document.getElementById('main-nav').classList.remove('hidden');
        const links = document.getElementById('nav-links');
        links.innerHTML = `
            <div class="nav-link" onclick="navigate('/')" data-nav="dashboard">Ana Sayfa</div>
            <div class="nav-link" onclick="navigate('/library')" data-nav="library">Analizlerim</div>
            <div class="nav-link" onclick="navigate('/train')" data-nav="train">
                <span class="flex items-center gap-1.5">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Yeni Analiz
                </span>
            </div>
            ${isAdmin() ? '<div class="nav-link" onclick="navigate(\'/admin\')" data-nav="admin">Y\u00f6netim</div>' : ''}
        `;
        const userDiv = document.getElementById('nav-user');
        const roleBadge = currentUser.role === 'master_admin' ? '<span class="tag tag-purple text-xs">Ana Y\u00f6netici</span>'
            : currentUser.role === 'admin' ? '<span class="tag tag-blue text-xs">Y\u00f6netici</span>'
            : '';
        userDiv.innerHTML = `
            <div class="flex items-center gap-2">
                ${roleBadge}
                <span class="text-sm font-medium text-slate-600">${esc(currentUser.display_name || currentUser.username)}</span>
            </div>
            <button class="btn-secondary btn-sm" onclick="logout()">\u00c7\u0131k\u0131\u015f</button>
        `;
    }

    function updateNav(path) {
        document.querySelectorAll('.nav-link').forEach(el => {
            el.classList.remove('active');
            const nav = el.dataset.nav;
            if (nav === 'dashboard' && path === '/') el.classList.add('active');
            if (nav === 'library' && path === '/library') el.classList.add('active');
            if (nav === 'train' && path.startsWith('/train')) el.classList.add('active');
            if (nav === 'admin' && path === '/admin') el.classList.add('active');
        });
    }

    function destroyCharts() { Object.values(chartInstances).forEach(c => c.destroy()); chartInstances = {}; _pollTimers.forEach(clearTimeout); _pollTimers = []; _audioObjectURLs.forEach(u => URL.revokeObjectURL(u)); _audioObjectURLs = []; }
    function app() { return document.getElementById('app'); }

    function timeAgo(dateStr) {
        const d = new Date(dateStr);
        const now = new Date();
        const diff = (now - d) / 1000;
        if (diff < 60) return 'az \u00f6nce';
        if (diff < 3600) return Math.floor(diff/60) + ' dk \u00f6nce';
        if (diff < 86400) return Math.floor(diff/3600) + ' sa \u00f6nce';
        if (diff < 2592000) return Math.floor(diff/86400) + ' g\u00fcn \u00f6nce';
        return d.toLocaleDateString('tr-TR');
    }

    function scoreColor(score, taskType) {
        // For timeseries (MASE): lower is better
        if (taskType === 'timeseries') {
            if (score <= 0.5) return 'text-brand-600';   // excellent
            if (score <= 1.0) return 'text-brand-700';   // good (better than naive)
            if (score <= 2.0) return 'text-warn-500';    // mediocre
            return 'text-danger-500';                     // poor
        }
        // For tabular: higher is better (0-1 scale)
        if (score >= 0.9) return 'text-brand-600';
        if (score >= 0.75) return 'text-brand-700';
        if (score >= 0.6) return 'text-warn-500';
        return 'text-danger-500';
    }

    function formatScore(score, taskType) {
        if (taskType === 'timeseries') {
            return score.toFixed(2);   // raw MASE value like "0.42"
        }
        return '%' + (score * 100).toFixed(1);  // percentage like "%92.3"
    }

    function scoreLabel(taskType) {
        if (taskType === 'timeseries') return 'MASE';
        if (taskType === 'call_analysis') return 'Ba\u015far\u0131';
        return 'Ba\u015far\u0131';
    }

    function cpuTag(cat) {
        if (cat === 'D\u00fc\u015f\u00fck') return '<span class="tag tag-green">D\u00fc\u015f\u00fck CPU</span>';
        if (cat === 'Orta') return '<span class="tag tag-orange">Orta CPU</span>';
        return '<span class="tag tag-red">Y\u00fcksek CPU</span>';
    }

    function sqlTag(sql) {
        if (sql.easy_sql) return '<span class="tag tag-green">Otomatik \u00e7al\u0131\u015fabilir</span>';
        return '<span class="tag tag-gray">Desteklenmiyor</span>';
    }

    function airflowTag(af) {
        if (af.supported) return '<span class="tag tag-green">Otomatik \u00e7al\u0131\u015fabilir</span>';
        return '<span class="tag tag-gray">Desteklenmiyor</span>';
    }

    async function logout() {
        await api('/api/auth/logout', { method: 'POST' });
        currentUser = null;
        authToken = null;
        localStorage.removeItem('authToken');
        document.getElementById('main-nav').classList.add('hidden');
        renderLogin();
    }

    // ══════════════════════════════════════════════════════════
    //  LOGIN
    // ══════════════════════════════════════════════════════════
    function renderLogin() {
        document.getElementById('main-nav').classList.add('hidden');
        app().innerHTML = `
        <div class="login-container" style="margin: -32px -24px; padding: 32px 24px;">
            <div class="card p-10 w-full max-w-md fade-in" style="box-shadow: 0 8px 32px rgba(0,0,0,0.08);">
                <div class="text-center mb-8">
                    <div class="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4" style="background: linear-gradient(135deg, #10B981, #059669);">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                    </div>
                    <h1 class="text-2xl font-bold text-slate-800 mb-1">Tahmin Platformu</h1>
                    <p class="text-slate-500 text-sm">Hesab\u0131n\u0131za giri\u015f yap\u0131n</p>
                </div>
                <div id="login-error" class="hidden mb-4 p-3 rounded-lg bg-red-50 text-danger-600 text-sm border border-red-200"></div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1.5">Kullan\u0131c\u0131 Ad\u0131</label>
                        <input class="input-field" id="login-user" placeholder="admin" autofocus onkeydown="if(event.key==='Enter')doLogin()">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1.5">\u015eifre</label>
                        <input class="input-field" id="login-pass" type="password" placeholder="\u2022\u2022\u2022\u2022\u2022\u2022" onkeydown="if(event.key==='Enter')doLogin()">
                    </div>
                    <button class="btn-primary w-full text-center py-3" onclick="doLogin()" id="login-btn">Giri\u015f Yap</button>
                </div>
                <div class="text-center mt-5 pt-4" style="border-top: 1px solid #E2E8F0;">
                    <p class="text-slate-500 text-sm">Hesab\u0131n\u0131z yok mu?</p>
                    <button class="btn-secondary w-full mt-2" onclick="renderSelfRegister()">Kay\u0131t Ol</button>
                </div>
            </div>
        </div>`;
    }

    async function doLogin() {
        const username = document.getElementById('login-user').value.trim();
        const password = document.getElementById('login-pass').value;
        const errDiv = document.getElementById('login-error');
        const btn = document.getElementById('login-btn');

        if (!username || !password) {
            errDiv.textContent = 'Kullan\u0131c\u0131 ad\u0131 ve \u015fifre gerekli';
            errDiv.classList.remove('hidden');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Giri\u015f yap\u0131l\u0131yor...';

        try {
            const res = await fetch(API + '/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password }),
            });
            const data = await res.json();

            if (data.success) {
                authToken = data.token;
                localStorage.setItem('authToken', authToken);
                currentUser = data.user;
                showNav();
                navigate('/');
                router();
            } else {
                errDiv.textContent = data.error || 'Giri\u015f ba\u015far\u0131s\u0131z. L\u00fctfen bilgilerinizi kontrol edin.';
                errDiv.classList.remove('hidden');
            }
        } catch (err) {
            errDiv.textContent = 'Sunucuya ba\u011flanamad\u0131. L\u00fctfen tekrar deneyin.';
            errDiv.classList.remove('hidden');
        }

        btn.disabled = false;
        btn.textContent = 'Giri\u015f Yap';
    }

    function renderSelfRegister() {
        document.getElementById('main-nav').classList.add('hidden');
        app().innerHTML = `
        <div class="login-container" style="margin: -32px -24px; padding: 32px 24px;">
            <div class="card p-10 w-full max-w-md fade-in" style="box-shadow: 0 8px 32px rgba(0,0,0,0.08);">
                <div class="text-center mb-6">
                    <div class="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4" style="background: linear-gradient(135deg, #10B981, #059669);">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>

    async function doSelfRegister() {
        const display_name = document.getElementById('reg-displayname').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const company = document.getElementById('reg-company').value.trim();
        const username = document.getElementById('reg-username').value.trim();
        const password = document.getElementById('reg-password').value;
        const password2 = document.getElementById('reg-password2').value;
        const errDiv = document.getElementById('register-error');
        const successDiv = document.getElementById('register-success');
        const btn = document.getElementById('reg-btn');

        errDiv.classList.add('hidden');
        successDiv.classList.add('hidden');

        if (!display_name || !email || !username || !password) {
            errDiv.textContent = 'T\u00fcm alanlar\u0131 doldurun';
            errDiv.classList.remove('hidden');
            return;
        }
        if (password !== password2) {
            errDiv.textContent = '\u015eifreler e\u015fle\u015fmiyor';
            errDiv.classList.remove('hidden');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'G\u00f6nderiliyor...';

        try {
            const res = await fetch(API + '/api/auth/self-register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, display_name, email, company }),
            });
            const data = await res.json();
            if (data.success) {
                successDiv.textContent = data.message || 'Ba\u015fvurunuz al\u0131nd\u0131. Y\u00f6netici onay\u0131 bekleniyor.';
                successDiv.classList.remove('hidden');
                btn.textContent = 'Ba\u015fvuru G\u00f6nderildi';
            } else {
                errDiv.textContent = data.error || 'Bir sorun olu\u015ftu';
                errDiv.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Ba\u015fvuru G\u00f6nder';
            }
        } catch (err) {
            errDiv.textContent = 'Sunucuya ba\u011flanamad\u0131';
            errDiv.classList.remove('hidden');
            btn.disabled = false;
            btn.textContent = 'Ba\u015fvuru G\u00f6nder';
        }
    }

    function filterLibrary() {
        const search = document.getElementById('lib-search')?.value?.toLowerCase() || '';
        let models = window._libraryModels || [];
        if (search) models = models.filter(m =>
            m.name.toLowerCase().includes(search) || m.target_column.toLowerCase().includes(search) ||
            (m.owner || '').toLowerCase().includes(search)
        );
        const tbody = document.getElementById('lib-tbody');
        if (tbody) tbody.innerHTML = renderModelRows(models);
    }

    function handleDrop(e) { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f) processFile(f); }
    function handleFileSelect(input) { const f = input.files[0]; if (f) processFile(f); }

    function onTaskTypeChange() {
        const taskType = document.getElementById('task-type').value;
        const tsFields = document.getElementById('ts-fields');
        if (tsFields) {
            tsFields.classList.toggle('hidden', taskType !== 'timeseries');
        }
    }

    async function processFile(file) {
        const MAX_FILE_SIZE_MB = 200;
        if (file.size > MAX_FILE_SIZE_MB * 1024 * 1024) {
            alert(`Dosya \u00e7ok b\u00fcy\u00fck (${(file.size / 1024 / 1024).toFixed(1)}MB). Maksimum: ${MAX_FILE_SIZE_MB}MB`);
            return;
        }
        const formData = new FormData();
        formData.append('file', file);
        try {
            const res = await fetch(API + '/api/upload-csv', {
                method: 'POST', body: formData,
                headers: authToken ? { 'Authorization': 'Bearer ' + authToken } : {},
            });
            const data = await res.json();
            if (data.error) { alert('Bir sorun olu\u015ftu: ' + data.error); return; }
            uploadData = data;
            document.getElementById('train-step1').classList.add('hidden');
            document.getElementById('train-step2').classList.remove('hidden');
            document.getElementById('file-info').textContent = `${data.filename} \u2014 ${data.columns.length} s\u00fctun`;
            const select = document.getElementById('target-col');
            select.innerHTML = data.columns.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');

            // Populate time series dropdowns
            const tsCol = document.getElementById('timestamp-col');
            const idCol = document.getElementById('item-id-col');
            if (tsCol) tsCol.innerHTML = data.columns.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
            if (idCol) idCol.innerHTML = '<option value="">\u2014 Tekli seri \u2014</option>' + data.columns.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');

            renderPreviewTable(data.preview, data.columns);
        } catch (err) { alert('Dosya y\u00fcklenirken bir sorun olu\u015ftu. L\u00fctfen tekrar deneyin.'); }
    }

    function renderPreviewTable(rows, columns) {
        let html = '<table class="data-table"><thead><tr>';
        columns.forEach(c => { html += `<th class="text-xs">${esc(c)}</th>`; });
        html += '</tr></thead><tbody>';
        rows.forEach(row => {
            html += '<tr>';
            columns.forEach(c => {
                const val = row[c];
                const isNull = val === null || val === undefined || val === '' || (typeof val === 'number' && !isFinite(val));
                html += isNull ? `<td class="p-2 border-b border-slate-100 whitespace-nowrap text-slate-400 italic">BO\u015e</td>`
                    : `<td class="p-2 text-slate-700 border-b border-slate-100 whitespace-nowrap max-w-32 truncate">${esc(val)}</td>`;
            });
            html += '</tr>';
        });
        html += '</tbody></table>';
        document.getElementById('preview-table').innerHTML = html;
    }

    async function startTraining() {
        if (!uploadData) return;
        const trainBtn = document.querySelector('[onclick*="startTraining"]');
        if (trainBtn) trainBtn.disabled = true;
        const taskType = document.getElementById('task-type').value;
        const payload = {
            temp_id: uploadData.temp_id,
            target_column: document.getElementById('target-col').value,
            task_type: taskType,
            preset: document.getElementById('preset').value,
            model_name: document.getElementById('model-name').value || '\u0130simsiz Analiz',
            visibility: document.getElementById('visibility').value,
        };

        // Add time series specific params
        if (taskType === 'timeseries') {
            const tsCol = document.getElementById('timestamp-col');
            const idCol = document.getElementById('item-id-col');
            const predLen = document.getElementById('prediction-length');
            if (tsCol) payload.timestamp_column = tsCol.value;
            if (idCol && idCol.value) payload.item_id_column = idCol.value;
            if (predLen) payload.prediction_length = parseInt(predLen.value) || 10;

            if (!payload.timestamp_column) {
                alert('Gelecek tahmini i\u00e7in bir zaman s\u00fctunu se\u00e7melisiniz.');
                if (trainBtn) trainBtn.disabled = false;
                return;
            }
        }

        document.getElementById('train-step1').classList.add('hidden');
        document.getElementById('train-step2').classList.add('hidden');
        document.getElementById('train-step3').classList.remove('hidden');
        try {
            const res = await api('/api/train', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (res.error) {
                alert('Bir sorun olu\u015ftu: ' + res.error);
                document.getElementById('train-step2').classList.remove('hidden');
                document.getElementById('train-step3').classList.add('hidden');
                if (trainBtn) trainBtn.disabled = false;
                return;
            }
            pollTrainingStatus(res.job_id);
        } catch (err) {
            alert('Bir sorun olu\u015ftu. L\u00fctfen tekrar deneyin.');
            document.getElementById('train-step2').classList.remove('hidden');
            document.getElementById('train-step3').classList.add('hidden');
            if (trainBtn) trainBtn.disabled = false;
        }
    }

    async function pollTrainingStatus(jobId) {
        _pollTimers.forEach(clearTimeout); _pollTimers = [];
        let progress = 10;
        let _pollCount = 0;
        const MAX_POLLS = 1800;
        const progressEl = document.getElementById('train-progress');
        const statusEl = document.getElementById('train-status-text');
        const poll = async () => {
            if (++_pollCount > MAX_POLLS) {
                if (statusEl) statusEl.textContent = '\u0130\u015flem \u00e7ok uzun s\u00fcr\u00fcyor. L\u00fctfen sayfay\u0131 yenileyip kontrol edin.';
                return;
            }
            try {
                const res = await api(`/api/training/${jobId}/status`);
                if (res.error && !res.status) {
                    if (statusEl) statusEl.textContent = 'Sunucu yan\u0131t vermiyor. Sayfa yenileniyor...';
                    _pollTimers.push(setTimeout(() => location.reload(), 5000));
                    return;
                }
                if (res.status === 'done') {
                    if (progressEl) progressEl.style.width = '100%';
                    if (statusEl) statusEl.textContent = 'Analiz tamamland\u0131!';
                    _pollTimers.push(setTimeout(() => navigate(`/model/${res.model_id}/results`), 800));
                    return;
                }
                if (res.status === 'error') {
                    const step3 = document.getElementById('train-step3');
                    if (step3) {
                        const errMsg = res.error || 'Bilinmeyen hata';
                        const isTorchCVE = errMsg.includes('CVE-2025') || errMsg.includes('upgrade torch');
                        step3.innerHTML = `
                            <div class="card p-10 text-center">
                                <div class="mx-auto mb-4 w-14 h-14 rounded-full bg-red-100 flex items-center justify-center">
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                                </div>
                                <h3 class="font-bold text-xl text-red-700 mb-2">Analiz Ba\u015far\u0131s\u0131z Oldu</h3>
                                <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-5 text-left max-w-lg mx-auto">
                                    <p class="text-red-700 text-sm break-words">${esc(errMsg.length > 300 ? errMsg.substring(0, 300) + '\u2026' : errMsg)}</p>
                                    ${isTorchCVE ? '<p class="text-red-600 text-xs mt-2 font-semibold">\u00c7\u00f6z\u00fcm: PyTorch s\u00fcr\u00fcm\u00fcn\u00fc g\u00fcncelleyin: pip install torch>=2.6.0</p>' : ''}
                                </div>
                                <button class="btn-primary" onclick="navigate('/train')">Tekrar Dene</button>
                            </div>`;
                    }
                    return;
                }
                if (res.position != null && res.position >= 0) {
                    if (statusEl) statusEl.textContent = `S\u0131ran\u0131z: ${res.position + 1}. s\u0131rada bekliyorsunuz...`;
                    progress = Math.min(progress + 1, 15);
                    if (progressEl) progressEl.style.width = progress + '%';
                    _pollTimers.push(setTimeout(poll, 3000));
                    return;
                }
                progress = Math.min(progress + Math.random() * 8, 90);
                if (progressEl) progressEl.style.width = progress + '%';
                const messages = ['Veriler inceleniyor...', 'Farkl\u0131 y\u00f6ntemler deneniyor...', 'En iyi sonu\u00e7 aran\u0131yor...', 'Sonu\u00e7lar hesaplan\u0131yor...', 'Veriler temizleniyor...', 'Sonu\u00e7lar kar\u015f\u0131la\u015ft\u0131r\u0131l\u0131yor...'];
                if (statusEl) statusEl.textContent = messages[Math.floor(Math.random() * messages.length)];
                _pollTimers.push(setTimeout(poll, 2000));
            } catch { _pollTimers.push(setTimeout(poll, 3000)); }
        };
        _pollTimers.push(setTimeout(poll, 2000));
    }

    let audioFiles = [];      // File objects from drag-drop
    let schemaRowCount = 0;

    function switchTrainMode(mode) {

    function addSchemaRow() {
        schemaRowCount++;
        const container = document.getElementById('schema-rows');
        const row = document.createElement('div');
        row.className = 'flex gap-3 items-center mb-2';
        row.id = `schema-row-${schemaRowCount}`;
        row.innerHTML = `
            <input class="input-field flex-1" placeholder="Kriter ad\u0131 (ornegin: musteri_memnun_mu)" data-schema="name" style="font-family: 'JetBrains Mono', monospace; font-size: 13px;">
            <select class="input-field" data-schema="type" style="width: 180px;">
                <option value="classification">Evet/Hay\u0131r</option>
                <option value="regression">Puanlama (1-10 gibi)</option>
            </select>
            <button class="btn-danger-sm" onclick="this.parentElement.remove(); renderAudioGroundTruth();" title="Sil">\u2715</button>
        `;
        row.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('change', () => renderAudioGroundTruth());
        });
        container.appendChild(row);
    }

    function getSchema() {
        const rows = document.querySelectorAll('#schema-rows > div');
        const schema = [];
        rows.forEach(row => {
            const name = row.querySelector('[data-schema="name"]').value.trim();
            const type = row.querySelector('[data-schema="type"]').value;
            if (name) schema.push({ name, type });
        });
        return schema;
    }

    function handleAudioDrop(e) {
        e.preventDefault();
        e.currentTarget.classList.remove('dragover');
        const files = Array.from(e.dataTransfer.files).filter(f =>
            /\.(wav|mp3|m4a|ogg|flac)$/i.test(f.name)
        );
        addAudioFiles(files);
    }

    function handleAudioFileSelect(input) {
        const files = Array.from(input.files);
        addAudioFiles(files);
        input.value = '';
    }

    function addAudioFiles(files) {
        const MAX_AUDIO_SIZE_MB = 200;
        files.forEach(f => {
            if (f.size > MAX_AUDIO_SIZE_MB * 1024 * 1024) {
                alert(`Dosya \u00e7ok b\u00fcy\u00fck: ${esc(f.name)} (${(f.size / 1024 / 1024).toFixed(1)}MB). Maksimum: ${MAX_AUDIO_SIZE_MB}MB`);
                return;
            }
            if (!audioFiles.some(af => af.name === f.name)) {
                audioFiles.push(f);
            }
        });
        renderAudioFilesList();
    }

    function removeAudioFile(idx) {
        audioFiles.splice(idx, 1);
        renderAudioFilesList();
    }

    function renderAudioFilesList() {
        const container = document.getElementById('audio-files-list');
        _audioObjectURLs.forEach(u => URL.revokeObjectURL(u)); _audioObjectURLs = [];
        if (!audioFiles.length) {
            container.innerHTML = '';
            return;
        }
        const schema = getSchema();
        let html = `<div class="text-xs text-slate-500 mb-2 font-semibold uppercase tracking-wider">${audioFiles.length} dosya y\u00fcklendi</div>`;
        html += '<div class="space-y-3">';
        audioFiles.forEach((f, idx) => {
            const url = URL.createObjectURL(f);
            _audioObjectURLs.push(url);
            const sizeMB = (f.size / 1024 / 1024).toFixed(1);
            html += `<div class="border border-slate-200 rounded-xl p-4 bg-slate-25">
                <div class="flex items-center gap-3 mb-3">
                    <div class="flex-1">
                        <div class="text-sm font-semibold text-slate-800 flex items-center gap-2">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
                            ${esc(f.name)}
                        </div>
                        <div class="text-xs text-slate-400">${sizeMB} MB</div>
                    </div>
                    <audio controls src="${url}" preload="metadata" style="height: 32px; max-width: 260px;"></audio>
                    <button class="btn-danger-sm" onclick="removeAudioFile(${idx})" title="Sil">\u2715</button>
                </div>`;

            if (schema.length > 0) {
                html += '<div class="grid gap-2" style="grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));">';
                schema.forEach(v => {
                    const inputType = v.type === 'regression' ? 'number' : 'text';
                    html += `<div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">${esc(v.name)} <span class="tag ${v.type === 'classification' ? 'tag-green' : 'tag-orange'}" style="font-size:10px;">${v.type === 'classification' ? 'Evet/Hay\u0131r' : 'Puan'}</span></label>
                        <input class="input-field text-sm" type="${inputType}" placeholder="Ger\u00e7ek de\u011fer" data-actual-file="${esc(f.name)}" data-actual-var="${esc(v.name)}" ${inputType === 'number' ? 'step="any"' : ''}>
                    </div>`;
                });
                html += '</div>';
            }
            html += '</div>';
        });
        html += '</div>';
        container.innerHTML = html;
    }

    function renderAudioGroundTruth() {
        // Re-render file list to update ground truth inputs when schema changes
        renderAudioFilesList();
    }

    function collectActuals() {
        const actuals = {};
        document.querySelectorAll('[data-actual-file]').forEach(el => {
            const fname = el.getAttribute('data-actual-file');
            const vname = el.getAttribute('data-actual-var');
            const val = el.value.trim();
            if (val) {
                if (!actuals[fname]) actuals[fname] = {};
                actuals[fname][vname] = val;
            }
        });
        return actuals;
    }

    async function startAudioEvaluation() {
        const schema = getSchema();
        if (!schema.length) return alert('En az bir kriter tan\u0131mlamal\u0131s\u0131n\u0131z.');
        const prompt = document.getElementById('audio-prompt').value.trim();
        if (!prompt) return alert('De\u011ferlendirme talimat\u0131 yazmal\u0131s\u0131n\u0131z.');
        if (!audioFiles.length) return alert('En az bir ses dosyas\u0131 y\u00feklemelisiniz.');

        const modelName = document.getElementById('audio-model-name').value.trim() || `Ses Analizi ${new Date().toLocaleString('tr-TR')}`;
        const language = document.getElementById('audio-language').value;
        const visibility = document.getElementById('audio-visibility').value;
        const actuals = collectActuals();

        // Build FormData
        const fd = new FormData();
        fd.append('model_name', modelName);
        fd.append('schema', JSON.stringify(schema));
        fd.append('prompt', prompt);
        fd.append('language', language);
        fd.append('visibility', visibility);
        fd.append('actuals', JSON.stringify(actuals));
        audioFiles.forEach(f => fd.append('audio_files', f, f.name));

        // Replace entire page with full-screen progress view
        app().innerHTML = `
        <div class="fade-in max-w-3xl mx-auto">
            <div class="mb-8">
                <h1 class="text-3xl font-bold tracking-tight text-slate-900 mb-1">Ses Analizi Devam Ediyor</h1>
                <p class="text-slate-500 text-sm">Ses kay\u0131tlar\u0131 i\u015fleniyor, l\u00fctfen bekleyin</p>
            </div>
            <div class="card p-10 text-center">
                <div class="spinner mx-auto mb-5"></div>
                <h3 class="font-bold text-xl text-slate-800 mb-2">Ses dosyalar\u0131 i\u015fleniyor...</h3>
                <p class="text-slate-500 text-sm mb-4">Ses kay\u0131tlar\u0131 yaz\u0131ya d\u00f6k\u00fcl\u00fcp de\u011ferlendiriliyor</p>
                <div class="progress-bar w-72 mx-auto">
                    <div class="progress-bar-fill" id="audio-eval-bar" style="width: 5%"></div>
                </div>
                <p class="text-slate-400 text-xs mt-3" id="audio-eval-status-text">Sunucuya g\u00f6nderiliyor...</p>
            </div>
        </div>`;

        try {
            const res = await fetch(API + '/api/audio-evaluate', {
                method: 'POST', body: fd,
                headers: authToken ? { 'Authorization': 'Bearer ' + authToken } : {},
            });
            const data = await res.json();
            if (data.error) {
                alert('Bir sorun olu\u015ftu: ' + data.error);
                navigate('/train');
                return;
            }
            pollAudioEvalStatus(data.job_id);
        } catch (err) {
            alert('Bir sorun olu\u015ftu. L\u00fctfen tekrar deneyin.');
            navigate('/train');
        }
    }

    async function pollAudioEvalStatus(jobId) {
        _pollTimers.forEach(clearTimeout); _pollTimers = [];
        let _pollCount = 0;
        const MAX_POLLS = 1800;
        const barEl = document.getElementById('audio-eval-bar');
        const statusEl = document.getElementById('audio-eval-status-text');
        const poll = async () => {
            if (++_pollCount > MAX_POLLS) {
                if (statusEl) statusEl.textContent = '\u0130\u015flem \u00e7ok uzun s\u00fcr\u00fcyor. L\u00fctfen sayfay\u0131 yenileyip kontrol edin.';
                return;
            }
            try {
                const res = await api(`/api/audio-evaluate/${jobId}/status`);
                if (res.error && !res.status) {
                    if (statusEl) statusEl.textContent = 'Sunucu yan\u0131t vermiyor. Tekrar deneniyor...';
                    _pollTimers.push(setTimeout(poll, 5000));
                    return;
                }
                if (res.status === 'done') {
                    if (barEl) barEl.style.width = '100%';
                    if (statusEl) statusEl.textContent = 'Analiz tamamland\u0131!';
                    _pollTimers.push(setTimeout(() => navigate(`/model/${res.model_id}/results`), 800));
                    return;
                }
                if (res.status === 'error') {
                    const evalRetryBtn = document.getElementById('start-audio-eval-btn');
                    if (evalRetryBtn) evalRetryBtn.classList.remove('hidden');
                    if (statusEl) statusEl.textContent = 'Bir sorun olu\u015ftu: ' + (res.error || 'Bilinmeyen');
                    if (barEl) barEl.style.background = '#EF4444';
                    return;
                }
                if (res.position != null && res.position >= 0) {
                    if (statusEl) statusEl.textContent = `S\u0131ran\u0131z: ${res.position + 1}. s\u0131rada bekliyorsunuz...`;
                    if (barEl) barEl.style.width = '5%';
                    _pollTimers.push(setTimeout(poll, 3000));
                    return;
                }
                const total = Math.max(1, res.total || 0);
                const processed = res.processed || 0;
                const pct = Math.min(100, Math.max(5, Math.round((processed / total) * 100)));
                if (barEl) barEl.style.width = pct + '%';
                const msgs = ['Ses kayd\u0131 yaz\u0131ya d\u00f6k\u00fcl\u00fcyor...', 'Konu\u015fma metni \u00e7\u0131kar\u0131l\u0131yor...', 'De\u011ferlendirme yap\u0131l\u0131yor...', 'Sonu\u00e7lar hesaplan\u0131yor...'];
                if (statusEl) statusEl.textContent = `${processed}/${total} dosya i\u015flendi \u2014 ${msgs[Math.floor(Math.random() * msgs.length)]}`;
                _pollTimers.push(setTimeout(poll, 2500));
            } catch { _pollTimers.push(setTimeout(poll, 3000)); }
        };
        _pollTimers.push(setTimeout(poll, 2000));
    }

    function handlePredictAudioDrop(e) {
        e.preventDefault();
        e.currentTarget.classList.remove('dragover');
        const files = Array.from(e.dataTransfer.files).filter(f =>
            /\.(wav|mp3|m4a|ogg|flac)$/i.test(f.name)
        );
        addPredictAudioFiles(files);
    }

    function handlePredictAudioFileSelect(input) {
        const files = Array.from(input.files);
        addPredictAudioFiles(files);
        input.value = '';
    }

    function addPredictAudioFiles(files) {
        const MAX_AUDIO_SIZE_MB = 200;
        files.forEach(f => {
            if (f.size > MAX_AUDIO_SIZE_MB * 1024 * 1024) {
                alert(`Dosya \u00e7ok b\u00fcy\u00fck: ${esc(f.name)} (${(f.size / 1024 / 1024).toFixed(1)}MB). Maksimum: ${MAX_AUDIO_SIZE_MB}MB`);
                return;
            }
            if (!predictAudioFiles.some(af => af.name === f.name)) {
                predictAudioFiles.push(f);
            }
        });
        renderPredictAudioFilesList();
    }

    function removePredictAudioFile(idx) {
        predictAudioFiles.splice(idx, 1);
        renderPredictAudioFilesList();
    }

    function renderPredictAudioFilesList() {
        const container = document.getElementById('predict-audio-files-list');
        _audioObjectURLs.forEach(u => URL.revokeObjectURL(u)); _audioObjectURLs = [];

        predictAudioFiles.forEach((f, idx) => {
            const url = URL.createObjectURL(f);
            _audioObjectURLs.push(url);
            const sizeMB = (f.size / 1024 / 1024).toFixed(1);
            html += `<div class="flex items-center gap-3 border border-slate-200 rounded-lg p-3 bg-slate-25">

    async function startAudioPrediction(modelId) {
        if (!predictAudioFiles.length) return alert('En az bir ses dosyas\u0131 y\u00feklemelisiniz.');

        const predictBtn = document.getElementById('start-audio-predict-btn');

        predictAudioFiles.forEach(f => fd.append('audio_files', f, f.name));

        document.getElementById('start-audio-predict-btn').classList.add('hidden');
        document.getElementById('audio-predict-progress').classList.remove('hidden');
        document.getElementById('audio-predict-results').classList.add('hidden');

        try {
            const res = await fetch(API + `/api/models/${modelId}/predict-audio`, {
                method: 'POST', body: fd,
                headers: authToken ? { 'Authorization': 'Bearer ' + authToken } : {},
            });
            const data = await res.json();
            if (data.error) {
                alert('Bir sorun olu\u015ftu: ' + data.error);
                document.getElementById('start-audio-predict-btn').classList.remove('hidden');
                document.getElementById('audio-predict-progress').classList.add('hidden');
                if (predictBtn) predictBtn.disabled = false;
                return;
            }
            pollAudioPredictStatus(data.job_id, modelId);
        } catch (err) {
            alert('Bir sorun olu\u015ftu. L\u00fctfen tekrar deneyin.');
            document.getElementById('start-audio-predict-btn').classList.remove('hidden');
            document.getElementById('audio-predict-progress').classList.add('hidden');
            if (predictBtn) predictBtn.disabled = false;
        }
    }

    async function pollAudioPredictStatus(jobId, modelId) {
        _pollTimers.forEach(clearTimeout); _pollTimers = [];
        let _pollCount = 0;
        const MAX_POLLS = 1800;
        const barEl = document.getElementById('audio-predict-bar');
        const statusEl = document.getElementById('audio-predict-status-text');

        const poll = async () => {
            if (++_pollCount > MAX_POLLS) {
                if (statusEl) statusEl.textContent = '\u0130\u015flem \u00e7ok uzun s\u00fcr\u00fcyor. L\u00fctfen sayfay\u0131 yenileyip kontrol edin.';
                return;
            }
            try {
                const res = await api(`/api/audio-predict/${jobId}/status`);
                if (res.error && !res.status) {
                    if (statusEl) statusEl.textContent = 'Sunucu yan\u0131t vermiyor. Tekrar deneniyor...';
                    _pollTimers.push(setTimeout(poll, 5000));
                    return;
                }
                if (res.status === 'done') {
                    if (barEl) barEl.style.width = '100%';
                    if (statusEl) statusEl.textContent = 'Tahmin tamamland\u0131!';
                    _pollTimers.push(setTimeout(() => showAudioPredictResults(jobId, res.row_results || [], modelId), 600));
                    return;
                }
                if (res.status === 'error') {
                    if (statusEl) statusEl.textContent = 'Bir sorun olu\u015ftu: ' + (res.error || 'Bilinmeyen');
                    if (barEl) barEl.style.background = '#EF4444';
                    document.getElementById('start-audio-predict-btn').classList.remove('hidden');
                    return;
                }
                const total = Math.max(1, res.total || 0);
                const processed = res.processed || 0;
                const pct = Math.min(100, Math.max(5, Math.round((processed / total) * 100)));
                if (barEl) barEl.style.width = pct + '%';
                const msgs = ['Ses kayd\u0131 yaz\u0131ya d\u00f6k\u00fcl\u00fcyor...', 'Konu\u015fma metni \u00e7\u0131kar\u0131l\u0131yor...', 'De\u011ferlendirme yap\u0131l\u0131yor...', 'Sonu\u00e7lar hesaplan\u0131yor...'];
                if (statusEl) statusEl.textContent = `${processed}/${total} dosya i\u015flendi \u2014 ${msgs[Math.floor(Math.random() * msgs.length)]}`;
                _pollTimers.push(setTimeout(poll, 2500));
            } catch { _pollTimers.push(setTimeout(poll, 3000)); }
        };
        _pollTimers.push(setTimeout(poll, 2000));
    }

    async function downloadAudioPredictCSV(jobId) {
        try {
            const res = await fetch(API + `/api/audio-predict/${jobId}/download-csv`, {
                headers: authToken ? { 'Authorization': 'Bearer ' + authToken } : {},
            });
            if (!res.ok) { alert('Bir sorun olu\u015ftu. L\u00fctfen tekrar deneyin.'); return; }
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const disposition = res.headers.get('Content-Disposition') || '';
            const match = disposition.match(/filename="([^"]+)"/);
            a.download = match ? match[1] : `tahminler_ses_${jobId.substring(0,8)}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        } catch (err) {
            alert('Bir sorun olu\u015ftu. L\u00fctfen tekrar deneyin.');
        }
    }

                        ? 'MASE (Mean Absolute Scaled Error): 1.0\'den d\u00fc\u015f\u00fck = iyi sonu\u00e7. Bir y\u00f6nteme t\u0131klayarak tahmin yap\u0131n.'
                        : 'Bir y\u00f6nteme t\u0131klayarak tahmin yap\u0131n. Otomatik \u00e7al\u0131\u015ft\u0131rmak i\u00e7in sa\u011fdaki butonlar\u0131 kullan\u0131n.'}</p>
                </div>
                <table class="data-table">
                    <thead><tr>
                        <th>Y\u00f6ntem</th>
                        <th>${model.task_type === 'timeseries' ? 'MASE' : 'Ba\u015far\u0131'}</th>
                        <th>${model.task_type === 'regression' ? 'RMSE' : 'Do\u011frulama'}</th>
                        <th>Otomatik \u00c7al\u0131\u015ft\u0131rma</th>
                        <th class="text-right">Kullan</th>
                    </tr></thead>
                    <tbody>
                    ${submodels.map((sm, i) => {
                        const isTS = model.task_type === 'timeseries';
                        const isReg = model.task_type === 'regression';
                        const overfit = (isTS || isReg) ? 0 : ((sm.score_internal || 0) - sm.score);
                        const ofFlag = overfit > 0.05 ? '<span class="tag tag-red text-xs ml-1" title="\u0130\u00e7 skor test skorundan \u00e7ok y\u00fcksek \u2014 a\u015f\u0131r\u0131 \u00f6\u011frenme olabilir">\u26a0</span>' : '';
                        const autoTag = sm.airflow_support.supported ? '<span class="tag tag-green">Destekleniyor</span>' : '<span class="tag tag-gray">Desteklenmiyor</span>';
                        return `
                        <tr onclick="navigate('/model/${escAttr(modelId)}/predict/${encodeURIComponent(sm.name)}')">
                            <td>
                                <div class="flex items-center gap-2">
                                    ${i === 0 ? '<span class="tag tag-green text-xs">En \u0130yi</span>' : ''}
                                    <span class="font-medium text-sm row-name transition-colors">${esc(sm.name)}</span>
                                </div>
                            </td>
                            <td>
                                <div class="${scoreColor(sm.score, model.task_type)} font-mono text-sm font-bold">${formatScore(sm.score, model.task_type)}</div>
                                ${sm.ci_low != null ? '<div class="text-slate-400 font-mono" style="font-size:10px;">%' + ((sm.ci_low || 0) * 100).toFixed(0) + '\u2013' + ((sm.ci_high || 0) * 100).toFixed(0) + ' GA</div>' : ''}
                            </td>
                            <td class="font-mono text-sm text-slate-500">${(isTS || model.task_type === 'regression') ? (sm.score_internal || 0).toFixed(2) : '%' + ((sm.score_internal || 0) * 100).toFixed(1)}${ofFlag}</td>
                            <td>${autoTag}</td>
                            <td class="text-right" onclick="event.stopPropagation()">
                                <button class="btn-export btn-sm" onclick="navigate('/model/${escAttr(modelId)}/export/${encodeURIComponent(sm.name)}')">Kullan</button>
                            </td>
                        </tr>`;
                    }).join('')}
                    </tbody>
                </table>
            </div>
        </div>`;

        renderResultsChart(submodels, model.task_type);
    }

    function renderResultsChart(submodels, taskType) {
        const ctx = document.getElementById('results-chart');
        if (!ctx) return; // canvas element guaranteed by template; null check is sufficient
        const isTS = taskType === 'timeseries';

        // For timeseries (MASE, lower=better): sort ascending so best is on top visually
        // For tabular (score, higher=better): sort descending
        const sorted = [...submodels].sort((a, b) => isTS ? a.score - b.score : b.score - a.score);

        const colors = sorted.map(s => {
            if (isTS) {
                // MASE coloring: lower is better
                return s.score <= 0.5 ? 'rgba(16,185,129,0.8)' : s.score <= 1.0 ? 'rgba(5,150,105,0.7)' : s.score <= 2.0 ? 'rgba(249,115,22,0.7)' : 'rgba(239,68,68,0.7)';
            }
            return s.score >= 0.9 ? 'rgba(16,185,129,0.8)' : s.score >= 0.75 ? 'rgba(5,150,105,0.7)' : s.score >= 0.6 ? 'rgba(249,115,22,0.7)' : 'rgba(239,68,68,0.7)';
        });

        const chartData = isTS
            ? sorted.map(s => s.score.toFixed(2))
            : sorted.map(s => (s.score * 100).toFixed(1));

        const maxVal = isTS
            ? Math.ceil(Math.max(...sorted.map(s => s.score)) * 1.2)
            : 100;

        chartInstances['results'] = new Chart(ctx, {
            type: 'bar',
            data: { labels: sorted.map(s => s.name), datasets: [{ label: isTS ? 'MASE' : 'Ba\u015far\u0131', data: chartData, backgroundColor: colors, borderRadius: 6, barThickness: 26 }] },
            options: {
                indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1E293B', titleColor: '#F8FAFC', bodyColor: '#CBD5E1', callbacks: { label: ctx => isTS ? `MASE: ${ctx.raw}` : `Ba\u015far\u0131: ${ctx.raw}%` } } },
                scales: {
                    x: { min: 0, max: maxVal, grid: { color: '#F1F5F9' }, ticks: { color: '#64748B', callback: v => isTS ? v : '%' + v } },
                    y: { grid: { display: false }, ticks: { color: '#475569', font: { family: 'JetBrains Mono', size: 11 } } }
                }
            }
        });
    }

    async function runSinglePrediction(modelId, submodelName) {
        const inputs = document.querySelectorAll('[data-feature]');
        const features = {};
        inputs.forEach(inp => {
            let val = inp.value.trim();
            if (val === '') { features[inp.dataset.feature] = ''; return; }
            if (!isNaN(val) && val !== '') val = parseFloat(val);
            features[inp.dataset.feature] = val;
        });
        const filledCount = Object.values(features).filter(v => v !== '').length;
        if (filledCount === 0) { alert('L\u00fctfen en az bir bilgi girin.'); return; }

        try {
            const res = await api(`/api/models/${modelId}/predict/${encodeURIComponent(submodelName)}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ features }),
            });
            const resultDiv = document.getElementById('single-result');
            const contentDiv = document.getElementById('single-result-content');
            resultDiv.classList.remove('hidden');
            if (res.error) { contentDiv.innerHTML = `<p class="text-danger-500">${esc(res.error)}</p>`; return; }

            const emptyCount = Object.values(features).filter(v => v === '').length;
            const totalCount = Object.keys(features).length;
            const warningHtml = emptyCount > 0 ? `<div class="text-xs text-warn-600 mb-3 flex items-center gap-1.5"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>${totalCount} bilgiden ${emptyCount} tanesi bo\u015f b\u0131rak\u0131ld\u0131 \u2014 tahmin g\u00fcvenilirli\u011fi d\u00fc\u015f\u00fck olabilir</div>` : '';

            const predVal = res.prediction !== null && res.prediction !== undefined ? res.prediction : 'N/A';
            let html = warningHtml + `<div class="text-3xl font-bold text-slate-800 mb-3">${esc(predVal)}</div>`;

            if (res.probabilities && typeof res.probabilities === 'object') {
                html += '<div class="space-y-2 mt-4"><div class="text-sm text-slate-500 mb-2">G\u00fcven Skorlar\u0131:</div>';
                Object.entries(res.probabilities).sort((a, b) => b[1] - a[1]).forEach(([cls, prob]) => {
                    const safePct = (prob !== null && isFinite(prob)) ? (prob * 100).toFixed(1) : '0.0';
                    html += `<div class="flex items-center gap-3"><span class="text-sm font-mono w-20 text-slate-600">${esc(cls)}</span><div class="flex-1 h-5 rounded-full overflow-hidden bg-slate-100"><div class="h-full rounded-full" style="width: ${safePct}%; background: linear-gradient(90deg, #10B981, #34D399);"></div></div><span class="text-sm font-mono font-bold w-14 text-right ${parseFloat(safePct) > 50 ? 'text-brand-600' : 'text-slate-500'}">%${safePct}</span></div>`;
                });
                html += '</div>';
            }
            contentDiv.innerHTML = html;
        } catch (err) { alert('Bir sorun olu\u015ftu. L\u00fctfen tekrar deneyin.'); }
    }

    async function runTimeSeriesPrediction(file, modelId, submodelName) {
        if (!file) return;
        const resultDiv = document.getElementById('single-result');
        const contentDiv = document.getElementById('single-result-content');
        resultDiv.classList.remove('hidden');
        contentDiv.innerHTML = '<div class="spinner mx-auto my-4"></div><p class="text-slate-500 text-center">Ge\u00e7mi\u015f veri i\u015fleniyor ve tahmin \u00fcretiliyor...</p>';

        try {
            // Read CSV as text, parse to rows, send as JSON history
            const text = await file.text();
            const lines = text.trim().split('\n');
            if (lines.length < 2) {
                contentDiv.innerHTML = '<p class="text-danger-500">CSV en az 1 ba\u015fl\u0131k ve 1 veri sat\u0131r\u0131 i\u00e7ermelidir.</p>';
                return;
            }
            const headers = parseCSVLine(lines[0]);
            const history = [];
            for (let i = 1; i < lines.length; i++) {
                const vals = parseCSVLine(lines[i]);
                const row = {};
                headers.forEach((h, idx) => {
                    let v = vals[idx] || '';
                    if (!isNaN(v) && v !== '') v = parseFloat(v);
                    row[h] = v;
                });
                history.push(row);
            }

            const res = await api(`/api/models/${modelId}/predict/${encodeURIComponent(submodelName)}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ history }),
            });

            if (res.error) {
                contentDiv.innerHTML = `<p class="text-danger-500">${esc(res.error)}</p>`;
                return;
            }

            // Display forecast table
            const forecast = res.forecast || [];
            if (forecast.length === 0) {
                contentDiv.innerHTML = '<p class="text-slate-500">Tahmin sonucu bo\u015f d\u00f6nd\u00fc.</p>';
                return;
            }

            const cols = Object.keys(forecast[0]);
            let html = `<div class="text-sm text-slate-600 mb-3">${forecast.length} ad\u0131ml\u0131k tahmin \u00fcretildi</div>`;
            html += '<div class="overflow-x-auto"><table class="data-table text-xs"><thead><tr>';
            cols.forEach(c => { html += `<th>${esc(c)}</th>`; });
            html += '</tr></thead><tbody>';
            forecast.forEach(row => {
                html += '<tr>';
                cols.forEach(c => {
                    const v = row[c];
                    const display = v !== null && v !== undefined ? (typeof v === 'number' ? v.toFixed(4) : esc(v)) : '\u2014';
                    html += `<td class="font-mono">${display}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table></div>';
            contentDiv.innerHTML = html;
        } catch (err) {
            contentDiv.innerHTML = `<p class="text-danger-500">Bir sorun olu\u015ftu: ${esc(err.message)}</p>`;
        }
    }

    function handleBatchDrop(e, modelId, submodelName) { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f) runBatchFromFile(f, modelId, submodelName); }
    function runBatchPrediction(input, modelId, submodelName) { const f = input.files[0]; if (f) runBatchFromFile(f, modelId, submodelName); }

    async function runBatchFromFile(file, modelId, submodelName) {
        const batchResult = document.getElementById('batch-result');
        const batchContent = document.getElementById('batch-result-content');
        batchResult.classList.remove('hidden');
        batchContent.innerHTML = '<div class="spinner mx-auto my-4"></div><p class="text-slate-500">Toplu tahmin yap\u0131l\u0131yor...</p>';
        const formData = new FormData();
        formData.append('file', file);
        try {
            const res = await fetch(API + `/api/models/${modelId}/predict-batch/${encodeURIComponent(submodelName)}`, {
                method: 'POST', body: formData,
                headers: authToken ? { 'Authorization': 'Bearer ' + authToken } : {},
            });
            if (res.headers.get('Content-Type')?.includes('text/csv')) {
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                batchContent.innerHTML = `<svg class="mx-auto mb-3" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg><h3 class="text-xl font-bold text-brand-700 mb-2">Toplu Tahmin Tamamland\u0131</h3><p class="text-slate-500 text-sm mb-4">Tahminler CSV dosyan\u0131za eklendi</p><a href="${url}" download="tahminler.csv" class="btn-primary inline-flex items-center gap-2"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Tahminleri \u0130ndir</a>`;
            } else {
                const data = await res.json();
                batchContent.innerHTML = `<p class="text-danger-500">Bir sorun olu\u015ftu: ${esc(data.error || 'Bilinmeyen hata')}</p>`;
            }
        } catch (err) { batchContent.innerHTML = `<p class="text-danger-500">Bir sorun olu\u015ftu: ${esc(err.message)}</p>`; }
    }

    // ══════════════════════════════════════════════════════════
