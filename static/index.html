    async function loadExplainability(modelId, submodelName) {
        // Support both tabular and call_analysis containers
        const container = document.getElementById('explain-result') || document.getElementById('ca-explain-result');
        const btn = document.getElementById('run-explain-btn') || document.getElementById('run-ca-explain-btn');
        if (!container) return;
        if (btn) { btn.disabled = true; btn.textContent = 'Analiz ediliyor...'; }
        container.innerHTML = `<div class="card p-8 text-center"><div class="spinner mx-auto mb-4"></div><p class="text-slate-500">Analiz hesaplan\u0131yor...</p><p class="text-slate-400 text-xs mt-2">Bu i\u015flem 30-60 saniye s\u00fcrebilir</p></div>`;
        try {
            const res = await api(`/api/models/${modelId}/explain/${encodeURIComponent(submodelName)}`);
            if (res.error) { container.innerHTML = `<div class="card p-6"><p class="text-danger-500">${esc(res.error)}</p></div>`; if (btn) { btn.disabled = false; btn.textContent = 'Tekrar Dene'; } return; }

            // ── TIME SERIES EXPLAINABILITY ──
            if (res.task_type === 'timeseries' && res.series_data) {
                renderTimeSeriesExplain(container, res);
                if (btn) { btn.disabled = false; btn.textContent = 'Tekrar Analiz Et'; }
                return;
            }

            // ── CALL ANALYSIS (LLM) EXPLAINABILITY ──
            if (res.task_type === 'call_analysis') {
                renderCallAnalysisExplain(container, res);
                if (btn) { btn.disabled = false; btn.textContent = 'Tekrar Analiz Et'; }
                return;
            }

            // ── TABULAR EXPLAINABILITY ──
            const fi = res.feature_importance || [];
            if (fi.length === 0 && res.summary) {
                container.innerHTML = `<div class="card p-6 mb-6"><div class="prose text-sm text-slate-600">${esc(res.summary).replace(/### ([^\n]+)/g, '<h5 class="font-semibold text-slate-600 mt-2 mb-1">$1</h5>').replace(/## ([^\n]+)/g, '<h4 class="font-bold text-slate-700 mt-3 mb-1">$1</h4>').replace(/# ([^\n]+)/g, '<h4 class="font-bold text-slate-700 mt-4 mb-1">$1</h4>').replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>')}</div></div>`;
                if (btn) { btn.disabled = false; btn.textContent = 'Tekrar Analiz Et'; }
                return;
            }
            const topN = fi.slice(0, 15);
            let html = `<div class="card p-6 mb-6"><h3 class="font-semibold text-slate-800 mb-4 flex items-center gap-2">Hangi Bilgiler Etkili? <span class="tag tag-green text-xs">${esc(res.method || '')}</span></h3><div class="space-y-2">${topN.map((f, i) => {
                const pct = Math.max(0, Math.min(100, ((f.importance || 0) * 100))).toFixed(0);
                return `<div class="flex items-center gap-3"><span class="text-xs text-slate-400 w-5 text-right font-bold">${i+1}</span><span class="text-sm font-mono w-44 truncate text-slate-700" title="${esc(f.feature)}">${esc(f.feature)}</span><div class="flex-1 h-6 rounded overflow-hidden bg-slate-100"><div class="h-full rounded" style="width: ${pct}%; background: linear-gradient(90deg, #10B981, #34D399); min-width: 2px;"></div></div><span class="text-xs font-mono w-12 text-right text-slate-500">%${pct}</span></div>`;
            }).join('')}</div></div>`;

            // ── SHAP analysis (if available) ──
            if (res.shap && res.shap.shap_importance && res.shap.shap_importance.length > 0) {
                const shapItems = res.shap.shap_importance.slice(0, 15);
                html += `<div class="card p-6 mb-6"><h3 class="font-semibold text-slate-800 mb-4 flex items-center gap-2">Derinlemesine Analiz <span class="tag tag-blue text-xs">${esc(res.shap.method || 'SHAP')}</span></h3>
                    <p class="text-xs text-slate-400 mb-3">Her bilginin sonuca ne kadar etki etti\u011fini g\u00f6sterir.</p>
                    <div class="space-y-2">${shapItems.map((f, i) => {
                        const pct = Math.max(0, Math.min(100, ((f.importance || 0) * 100))).toFixed(0);
                        return `<div class="flex items-center gap-3"><span class="text-xs text-slate-400 w-5 text-right font-bold">${i+1}</span><span class="text-sm font-mono w-44 truncate text-slate-700" title="${esc(f.feature)}">${esc(f.feature)}</span><div class="flex-1 h-6 rounded overflow-hidden bg-slate-100"><div class="h-full rounded" style="width: ${pct}%; background: linear-gradient(90deg, #3B82F6, #60A5FA); min-width: 2px;"></div></div><span class="text-xs font-mono w-12 text-right text-slate-500">%${pct}</span></div>`;
                    }).join('')}</div></div>`;
            }

            container.innerHTML = html;
            if (btn) { btn.disabled = false; btn.textContent = 'Tekrar Analiz Et'; }
        } catch (err) { container.innerHTML = `<div class="card p-6"><p class="text-danger-500">Bir sorun olu\u015ftu: ${esc(err.message)}</p></div>`; if (btn) { btn.disabled = false; btn.textContent = 'Tekrar Dene'; } }
    }

    function renderCallAnalysisExplain(container, res) {
        const vars = res.variable_analysis || {};
        const samples = res.reasoning_samples || [];
        const hasActuals = Object.values(vars).some(va => (va.n || 0) > 0);

        let varsHtml = '';
        for (const [vn, va] of Object.entries(vars)) {
            const safeVn = esc(vn);
            if (hasActuals) {
                if (va.type === 'classification') {
                    const acc = va.accuracy || 0;
                    const accColor = acc >= 80 ? 'text-brand-600' : acc >= 60 ? 'text-warn-500' : 'text-danger-500';
                    varsHtml += `<div class="card p-5 mb-4">
                        <h4 class="font-semibold text-slate-800 text-sm mb-3">${safeVn} <span class="tag tag-green text-xs">Evet/Hay\u0131r</span></h4>
                        <div class="text-2xl font-bold ${accColor} mb-2">%${acc}</div>
                        <div class="text-xs text-slate-400 mb-3">${va.correct || 0}/${va.n || 0} do\u011fru tahmin</div>`;
                    if (va.per_class_accuracy) {
                        varsHtml += '<div class="space-y-1.5">';
                        for (const [cls, clsAcc] of Object.entries(va.per_class_accuracy)) {
                            const safeCls = esc(cls);
                            const pct = Math.round(clsAcc);
                            const barCol = pct >= 80 ? '#10B981' : pct >= 60 ? '#F59E0B' : '#EF4444';
                            varsHtml += `<div class="flex items-center gap-3"><span class="text-xs w-32 truncate text-slate-600">${safeCls}</span><div class="flex-1 h-4 rounded overflow-hidden bg-slate-100"><div class="h-full rounded" style="width:${pct}%;background:${barCol};min-width:2px;"></div></div><span class="text-xs font-mono w-10 text-right text-slate-500">%${pct}</span></div>`;
                        }
                        varsHtml += '</div>';
                    }
                    varsHtml += '</div>';
                } else if (va.type === 'regression') {
                    varsHtml += `<div class="card p-5 mb-4">
                        <h4 class="font-semibold text-slate-800 text-sm mb-3">${safeVn} <span class="tag tag-orange text-xs">Puan</span></h4>
                        <div class="text-xl font-bold text-slate-800 mb-1">MAE: ${va.mae != null ? va.mae : '\u2014'}</div>
                        <div class="text-xs text-slate-400">RMSE: ${va.rmse != null ? va.rmse : '\u2014'} \u00b7 n=${va.n || 0}</div>
                    </div>`;
                }
            } else {
                const predDist = va.predicted_distribution || {};
                const distEntries = Object.entries(predDist);
                if (va.type === 'classification' && distEntries.length > 0) {
                    const total = distEntries.reduce((s, e) => s + e[1], 0);
                    varsHtml += `<div class="card p-5 mb-4">
                        <h4 class="font-semibold text-slate-800 text-sm mb-3">${safeVn} <span class="tag tag-blue text-xs">Tahmin Da\u011f\u0131l\u0131m\u0131</span></h4>
                        <div class="space-y-1.5">`;
                    distEntries.forEach(([cls, cnt]) => {
                        const pct = total > 0 ? Math.round(cnt / total * 100) : 0;
                        varsHtml += `<div class="flex items-center gap-3"><span class="text-xs w-32 truncate text-slate-600">${esc(cls)}</span><div class="flex-1 h-4 rounded overflow-hidden bg-slate-100"><div class="h-full rounded" style="width:${pct}%;background:linear-gradient(90deg,#3B82F6,#60A5FA);min-width:2px;"></div></div><span class="text-xs font-mono w-16 text-right text-slate-500">${cnt} (%${pct})</span></div>`;
                    });
                    varsHtml += '</div></div>';
                } else if (va.type === 'regression') {
                    varsHtml += `<div class="card p-5 mb-4">
                        <h4 class="font-semibold text-slate-800 text-sm mb-3">${safeVn} <span class="tag tag-orange text-xs">Puan</span></h4>
                        <div class="text-xs text-slate-400">Tahmin verildi, kar\u015f\u0131la\u015ft\u0131rma i\u00e7in ger\u00e7ek de\u011ferler gerekli.</div>
                    </div>`;
                }
            }
        }

        let samplesHtml = '';
        if (samples.length > 0) {
            samplesHtml = `<div class="card p-5 mb-4">
                <h4 class="font-semibold text-slate-800 text-sm mb-3">\u00d6rnek De\u011ferlendirme Gerek\u00e7eleri</h4>
                <div class="space-y-2">${samples.map(s => {
                    const safeFn = esc(s.filename || '');
                    const safeR = esc(s.reasoning || '');
                    return `<details class="border border-slate-200 rounded-lg"><summary class="px-4 py-2 cursor-pointer text-sm font-medium text-slate-700 hover:bg-slate-50">${safeFn}</summary><div class="px-4 py-3 text-xs text-slate-600 bg-slate-25 border-t border-slate-100 whitespace-pre-wrap max-h-32 overflow-y-auto">${safeR}</div></details>`;
                }).join('')}</div>
            </div>`;
        }

        let errorHtml = '';
        if (res.error_count > 0) {
            errorHtml = `<div class="p-3 rounded-lg bg-red-50 border border-red-100 mb-4">
                <p class="text-xs text-red-700"><strong>${res.error_count}</strong> dosyada hata olu\u015ftu (%${res.error_rate}). Bu dosyalar analiz sonu\u00e7lar\u0131na dahil edilmedi.</p>
            </div>`;
        }

        const summaryFormatted = esc(res.summary || '').replace(/## ([^\n]+)/g, '<h4 class="font-bold text-slate-700 mt-3 mb-1">$1</h4>').replace(/### ([^\n]+)/g, '<h5 class="font-semibold text-slate-600 mt-2 mb-1">$1</h5>').replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(/  - /g, '<br>&nbsp;&nbsp;\u2022 ').replace(/\n/g, '<br>');

        container.innerHTML = `<div class="space-y-4">
            ${errorHtml}
            ${varsHtml}
            ${samplesHtml}
            <div class="card p-5">
                <h4 class="font-semibold text-slate-800 text-sm mb-3 flex items-center gap-2">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    \u00d6zet
                </h4>
                <div class="text-sm text-slate-600 leading-relaxed">${summaryFormatted}</div>
            </div>
        </div>`;
    }

    function renderTimeSeriesExplain(container, res) {
        destroyCharts();
        const stats = res.basic_stats || {};
        const trend = res.trend || {};
        const acf = res.autocorrelation || {};
        const decomp = res.decomposition;
        const stationarity = res.stationarity || {};
        const models = res.model_insights || [];

        // Strength gauge helper
        function gauge(val, label, color) {
            const pct = Math.min(100, Math.round((val || 0) * 100));
            return `<div class="flex items-center gap-3"><span class="text-xs text-slate-500 w-24">${label}</span><div class="flex-1 h-5 rounded-full overflow-hidden bg-slate-100"><div class="h-full rounded-full" style="width:${pct}%;background:${color};min-width:2px;"></div></div><span class="text-xs font-mono font-bold w-10 text-right text-slate-600">${pct}%</span></div>`;
        }

        // Stationarity badge
        const statBadge = stationarity.stationary === true
            ? '<span class="tag tag-green">Kararl\u0131</span>'
            : stationarity.stationary === false
            ? '<span class="tag tag-orange">De\u011fi\u015fken</span>'
            : '<span class="tag tag-gray">Bilinmiyor</span>';

        // Stationarity subtitle (plain language)
        const statSubtitle = stationarity.stationary === true
            ? 'Ortalamas\u0131 sabit, tahmin edilmesi kolay'
            : stationarity.stationary === false
            ? 'Ortalamas\u0131 de\u011fi\u015fiyor, dikkatli modelleme gerekir'
            : '';

        // Trend badge
        const trendBadge = trend.direction === 'y\u00fcksel\u0131\u015f'
            ? '<span class="tag tag-green">\u2191 Y\u00fcksel\u0131\u015f</span>'
            : trend.direction === 'd\u00fc\u015f\u00fc\u015f'
            ? '<span class="tag tag-orange">\u2193 D\u00fc\u015f\u00fc\u015f</span>'
            : '<span class="tag tag-gray">\u2192 Sabit</span>';

        // Trend subtitle (plain language)
        const trendR2 = (trend.r_squared || 0);
        const trendSubtitle = trendR2 > 0.6 ? 'G\u00fc\u00e7l\u00fc y\u00f6nelim' : trendR2 > 0.3 ? 'Orta d\u00fczey y\u00f6nelim' : 'Zay\u0131f y\u00f6nelim';

        const seasonBadge = acf.detected_seasonal_period
            ? `<span class="tag tag-blue">Her ${acf.detected_seasonal_period} ad\u0131mda</span>`
            : '<span class="tag tag-gray">Tespit Edilemedi</span>';

        const seasonPct = Math.round((res.seasonal_strength || 0) * 100);
        const seasonSubtitle = acf.detected_seasonal_period
            ? `Tekrar eden kal\u0131p g\u00fcc\u00fc: %${seasonPct}`
            : 'D\u00fczenli bir tekrar kal\u0131b\u0131 bulunamad\u0131';

        let html = `
        <div class="space-y-6">
            <!-- Stats Cards -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="stat-card">
                    <div class="text-slate-500 text-xs font-medium mb-1">Veri Say\u0131s\u0131</div>
                    <div class="text-2xl font-bold text-slate-800">${stats.count || '?'}</div>
                    <div class="text-xs text-slate-400 mt-1">${(stats.start || '').substring(0,10)} \u2014 ${(stats.end || '').substring(0,10)}</div>
                </div>
                <div class="stat-card">
                    <div class="text-slate-500 text-xs font-medium mb-1">Gidi\u015f Y\u00f6n\u00fc</div>
                    <div class="mb-1">${trendBadge}</div>
                    <div class="text-xs text-slate-400">${trendSubtitle}</div>
                </div>
                <div class="stat-card">
                    <div class="text-slate-500 text-xs font-medium mb-1">Tekrar Kal\u0131plar\u0131</div>
                    <div class="mb-1">${seasonBadge}</div>
                    <div class="text-xs text-slate-400">${seasonSubtitle}</div>
                </div>
                <div class="stat-card">
                    <div class="text-slate-500 text-xs font-medium mb-1">Tahmin Edilebilirlik</div>
                    <div class="mb-1">${statBadge}</div>
                    <div class="text-xs text-slate-400">${statSubtitle}</div>
                </div>
            </div>

            <!-- Strength Gauges -->
            <div class="card p-5">
                <h3 class="font-semibold text-slate-800 mb-4 text-sm">Veri \u00d6zellikleri</h3>
                <div class="space-y-3">
                    ${gauge(res.trend_strength, 'Trend G\u00fcc\u00fc', 'linear-gradient(90deg, #3B82F6, #60A5FA)')}
                    ${gauge(res.seasonal_strength, 'Mevsimsel G\u00fc\u00e7', 'linear-gradient(90deg, #8B5CF6, #A78BFA)')}
                    ${gauge(stats.cv ? Math.min(1, stats.cv) : 0, 'De\u011fi\u015fkenlik (CV)', 'linear-gradient(90deg, #F59E0B, #FBBF24)')}
                </div>
                <div class="mt-3 p-3 rounded-lg bg-blue-50 border border-blue-100">
                    <p class="text-xs text-blue-700"><strong>Nas\u0131l okunur:</strong> \u00c7ubuklar %100'e yak\u0131nsa o \u00f6zellik verilerinizde bask\u0131nd\u0131r. <strong>Trend G\u00fcc\u00fc</strong> = uzun vadeli y\u00f6n\u00fcn ne kadar belirgin oldu\u011fu. <strong>Mevsimsel G\u00fc\u00e7</strong> = tekrar eden kal\u0131plar\u0131n ne kadar d\u00fczenli oldu\u011fu. <strong>De\u011fi\u015fkenlik</strong> = verilerin ortalamadan ne kadar uzakla\u015ft\u0131\u011f\u0131 (y\u00fcksek = daha dalgal\u0131).</p>
                </div>
            </div>

            <!-- Time Series Chart -->
            <div class="card p-5">
                <h3 class="font-semibold text-slate-800 mb-2 text-sm">Verilerinizin Zaman \u0130\u00e7indeki Seyri</h3>
                <div style="height:280px;"><canvas id="ts-series-chart"></canvas></div>
                <div class="mt-3 p-3 rounded-lg bg-blue-50 border border-blue-100">
                    <p class="text-xs text-blue-700"><strong>Nas\u0131l okunur:</strong> <strong>Mavi alan</strong> ger\u00e7ek de\u011ferlerinizi, <strong>k\u0131rm\u0131z\u0131 kesikli \u00e7izgi</strong> genel y\u00f6nelimi (trendi) g\u00f6sterir. K\u0131rm\u0131z\u0131 \u00e7izgi yukar\u0131 gidiyorsa verileriniz art\u0131yor, a\u015fa\u011f\u0131 gidiyorsa azal\u0131yor. <strong>Turuncu \u00e7izgi</strong> (varsa) k\u0131sa vadeli dalgalanmalar\u0131 yumu\u015fatarak orta vadeli gidi\u015fat\u0131 g\u00f6sterir.</p>
                </div>
            </div>

            <!-- ACF Chart -->
            <div class="card p-5">
                <h3 class="font-semibold text-slate-800 mb-2 text-sm">Ge\u00e7mi\u015fle Ba\u011flant\u0131 Analizi</h3>
                <p class="text-xs text-slate-400 mb-3">Her \u00e7ubuk, verilerin ge\u00e7mi\u015fteki belirli bir ad\u0131m \u00f6nceki de\u011ferlerle ne kadar ba\u011flant\u0131l\u0131 oldu\u011funu g\u00f6sterir</p>

        if (seriesCtx && values.length > 0) {
            const datasets = [
                { label: res.target_column, data: values, borderColor: '#3B82F6', backgroundColor: 'rgba(59,130,246,0.08)', borderWidth: 1.5, pointRadius: 0, fill: true, tension: 0.1, order: 2 },
            ];
            if (trend.trend_line && trend.trend_line.length > 0) {
                datasets.push({ label: 'Trend', data: trend.trend_line, borderColor: '#EF4444', borderWidth: 2, borderDash: [6, 3], pointRadius: 0, fill: false, order: 1 });
            }
            const rmean = (res.rolling_stats || {}).rolling_mean;
            if (rmean && rmean.length > 0) {
                datasets.push({ label: `Hareketli Ort. (${(res.rolling_stats || {}).window || '?'})`, data: rmean, borderColor: '#F59E0B', borderWidth: 1.5, borderDash: [3, 2], pointRadius: 0, fill: false, order: 1 });
            }
            chartInstances['ts-series'] = new Chart(seriesCtx, {
                type: 'line',
                data: { labels: timestamps, datasets },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 20 } } }, scales: { x: { ticks: { maxTicksLimit: 12, font: { size: 10 } }, grid: { display: false } }, y: { grid: { color: '#F1F5F9' }, ticks: { font: { size: 10 } } } }, interaction: { mode: 'index', intersect: false } }
            });
        }

        // 2. ACF Chart (null check sufficient for canvas from template)
        const acfCtx = document.getElementById('ts-acf-chart');
        if (acfCtx && acf.acf_values && acf.acf_values.length > 1) {
            const lags = acf.acf_values.slice(1); // skip lag 0
            const lagLabels = lags.map((_, i) => i + 1);
            const confBand = acf.confidence_band || 0.1;
            const barColors = lags.map(v => Math.abs(v) > confBand ? 'rgba(59,130,246,0.8)' : 'rgba(203,213,225,0.6)');
            chartInstances['ts-acf'] = new Chart(acfCtx, {
                type: 'bar',
                data: { labels: lagLabels, datasets: [
                    { label: 'ACF', data: lags, backgroundColor: barColors, borderRadius: 2, barPercentage: 0.8 },
                ] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, annotation: {} },
                    scales: { x: { title: { display: true, text: 'Gecikme (Lag)', font: { size: 10 } }, ticks: { font: { size: 9 } }, grid: { display: false } }, y: { min: -1, max: 1, grid: { color: '#F1F5F9' }, ticks: { font: { size: 10 } } } } },

                    id: 'confLines',
                    afterDraw(chart) {
                        const { ctx: c, chartArea: a, scales: { y } } = chart;
                        c.save(); c.strokeStyle = '#3B82F6'; c.lineWidth = 1; c.setLineDash([5, 3]);
                        [confBand, -confBand].forEach(v => { const yp = y.getPixelForValue(v); c.beginPath(); c.moveTo(a.left, yp); c.lineTo(a.right, yp); c.stroke(); });
                        c.restore();
                    }
                }]
            });
        }

        // 3. Decomposition Charts
        if (decomp && timestamps.length > 0) {
            function decompChart(id, data, label, color) {
                const ctx = document.getElementById(id);
                if (!ctx || !data) return;
                chartInstances[id] = new Chart(ctx, {
                    type: 'line',
                    data: { labels: timestamps, datasets: [{ label, data, borderColor: color, borderWidth: 1.5, pointRadius: 0, fill: false, tension: 0.1, spanGaps: true }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top', labels: { font: { size: 10 }, boxWidth: 16 } } }, scales: { x: { ticks: { maxTicksLimit: 10, font: { size: 9 } }, grid: { display: false } }, y: { grid: { color: '#F1F5F9' }, ticks: { font: { size: 9 } } } } }
                });
            }
            decompChart('ts-decomp-trend', decomp.trend, 'Trend Bile\u015feni', '#3B82F6');
            decompChart('ts-decomp-season', decomp.seasonal, 'Mevsimsel Bile\u015fen', '#8B5CF6');
            decompChart('ts-decomp-resid', decomp.residual, 'Kal\u0131nt\u0131 (Residual)', '#94A3B8');
        }
    }

    async function calculateCost(modelId, submodelName, inferenceTime, numColumns) {
        // Guard: clamp inference time and columns to sensible positive values
        inferenceTime = Math.max(parseFloat(inferenceTime) || 0.1, 0.01);
        numColumns = Math.max(parseInt(numColumns) || 1, 1);
        const rows = Math.max(parseInt(document.getElementById('cost-rows').value) || 1000, 1);
        const freq = document.getElementById('cost-freq').value;
        try {
            const res = await api('/api/cost-estimate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ inference_time_sec: inferenceTime, num_rows: rows, num_columns: numColumns, frequency: freq }) });
            const resultDiv = document.getElementById('cost-result');
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = `<div class="grid grid-cols-2 gap-4"><div class="p-4 rounded-xl bg-brand-50 border border-brand-200"><div class="text-slate-500 text-xs mb-1">Tahmini Ayl\u0131k Maliyet</div><div class="text-3xl font-bold text-brand-700">$${res.total_monthly.toFixed(2)}</div></div><div class="p-4 rounded-xl bg-slate-50"><div class="text-slate-500 text-xs mb-1">Ayl\u0131k \u00c7al\u0131\u015fma Say\u0131s\u0131</div><div class="text-2xl font-bold text-slate-800">${res.executions_per_month}</div><div class="text-slate-400 text-xs">${res.estimated_job_duration_sec}sn/i\u015f \u00b7 ${res.time_per_row_ms}ms/sat\u0131r</div></div></div>`;
        } catch (err) { alert('Bir sorun olu\u015ftu. L\u00fctfen tekrar deneyin.'); }
    }

    async function downloadExport(type, modelId, submodelName) {
        const url = `/api/models/${modelId}/export/${encodeURIComponent(submodelName)}/${type}`;
        try {
            const res = await fetch(url, { headers: authToken ? { 'Authorization': 'Bearer ' + authToken } : {} });
            if (res.ok) {
                const blob = await res.blob();
                const link = document.createElement('a');
                const disposition = res.headers.get('Content-Disposition') || '';
                const filenameMatch = disposition.match(/filename="([^"]+)"/);
                const contentType = res.headers.get('Content-Type') || '';
                const ext = contentType.includes('zip') ? 'zip' : 'sql';
                link.href = URL.createObjectURL(blob);
                link.download = filenameMatch ? filenameMatch[1] : `disaaktar_${type}.${ext}`;
                link.click();
                URL.revokeObjectURL(link.href);
            } else {
                const data = await res.json();
                alert(data.error || 'Bir sorun olu\u015ftu. L\u00fctfen tekrar deneyin.');
            }
        } catch (err) { alert('Bir sorun olu\u015ftu. L\u00fctfen tekrar deneyin.'); }
    }

    async function downloadCallAnalysisCSV(modelId) {
        const url = `/api/models/${modelId}/call-analysis/download-csv`;
        try {
            const res = await fetch(url, { headers: authToken ? { 'Authorization': 'Bearer ' + authToken } : {} });
            if (res.ok) {
                const blob = await res.blob();
                const link = document.createElement('a');
                const disposition = res.headers.get('Content-Disposition') || '';
                const filenameMatch = disposition.match(/filename="([^"]+)"/);
                link.href = URL.createObjectURL(blob);
                link.download = filenameMatch ? filenameMatch[1] : `sonuclar_${modelId.substring(0,8)}.csv`;
                link.click();
                URL.revokeObjectURL(link.href);
            } else {
                const data = await res.json();
                alert(data.error || 'Bir sorun olu\u015ftu. L\u00fctfen tekrar deneyin.');
            }
        } catch (err) { alert('Bir sorun olu\u015ftu. L\u00fctfen tekrar deneyin.'); }
    }

    async function deleteModel(modelId, modelName, redirectTo) {
        if (!confirm(`"${modelName}" analizini silmek istedi\u011finize emin misiniz?\n\nBu i\u015flem geri al\u0131namaz. Analiz ve t\u00fcm sonu\u00e7lar\u0131 kal\u0131c\u0131 olarak silinecektir.`)) return;
        try {
            const res = await api(`/api/models/${modelId}/delete`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
            if (res.error) { alert('Silme s\u0131ras\u0131nda bir sorun olu\u015ftu: ' + res.error); return; }
            navigate(redirectTo || '/');
        } catch (err) { alert('Bir sorun olu\u015ftu. L\u00fctfen tekrar deneyin.'); }
    }

    // ══════════════════════════════════════════════════════════
    //  ADMIN PANEL
    // ══════════════════════════════════════════════════════════
    async function renderAdmin() {
        if (!isAdmin()) { renderNotFound(); return; }
        app().innerHTML = `<div class="flex items-center justify-center py-20"><div class="spinner"></div></div>`;
        const data = await api('/api/users');
        if (data.error) { app().innerHTML = `<div class="card p-8 text-center text-slate-500">${esc(data.error)}</div>`; return; }
        const pending = await api('/api/admin/pending-users');

        app().innerHTML = `
        <div class="fade-in">
            <div class="flex items-end justify-between mb-8">
                <div>
                    <h1 class="text-3xl font-bold tracking-tight text-slate-900 mb-1">Y\u00f6netim Paneli</h1>
                    <p class="text-slate-500 text-sm">Kullan\u0131c\u0131lar\u0131 y\u00f6netin ve yeni hesaplar olu\u015fturun</p>
                </div>
            </div>

            ${pending.count > 0 ? `
            <div class="mb-8">
                <div class="section-title flex items-center gap-2">
                    Bekleyen Ba\u015fvurular
                    <span class="tag tag-orange">${pending.count}</span>
                </div>
                <div class="card-flat overflow-hidden">
                    <table class="data-table">
                        <thead><tr><th>Ad Soyad</th><th>E-posta</th><th>Firma</th><th>Kullan\u0131c\u0131 Ad\u0131</th><th>Tarih</th><th></th></tr></thead>
                        <tbody>
                        ${pending.pending.map(u => `
                            <tr>
                                <td class="font-medium text-sm">${esc(u.display_name)}</td>
                                <td class="text-slate-500 text-sm">${esc(u.email)}</td>
                                <td class="text-slate-500 text-sm">${esc(u.company || '\u2014')}</td>
                                <td class="text-slate-400 text-xs">@${esc(u.username)}</td>
                                <td class="text-slate-400 text-xs">${timeAgo(u.created_at)}</td>
                                <td class="text-right">
                                    <button class="btn-primary btn-sm mr-1" onclick="approveUser('${escAttr(u.username)}')">Onayla</button>
                                    <button class="btn-danger-sm" onclick="rejectUser('${escAttr(u.username)}')">Reddet</button>
                                </td>
                            </tr>
                        `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
            ` : ''}

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2">
                    <div class="section-title">Kullan\u0131c\u0131lar</div>
                    <div class="card-flat overflow-hidden">
                        <table class="data-table">
                            <thead><tr><th>Kullan\u0131c\u0131</th><th>Rol</th><th>Olu\u015fturulma</th><th>Olu\u015fturan</th><th></th></tr></thead>
                            <tbody>
                            ${data.users.map(u => {
                                const roleLabel = u.role === 'master_admin' ? 'Ana Y\u00f6netici' : u.role === 'admin' ? 'Y\u00f6netici' : 'Kullan\u0131c\u0131';
                                const roleTag = u.role === 'master_admin' ? 'tag-purple' : u.role === 'admin' ? 'tag-blue' : 'tag-gray';
                                const canChangeRole = u.role !== 'master_admin' && u.username !== currentUser.username;
                                return `<tr>
                                    <td><div class="font-medium text-sm">${esc(u.display_name)}</div><div class="text-slate-400 text-xs">@${esc(u.username)}</div></td>
                                    <td><span class="tag ${roleTag}">${roleLabel}</span></td>
                                    <td class="text-slate-400 text-xs">${u.created_at ? timeAgo(u.created_at) : '\u2014'}</td>
                                    <td class="text-slate-400 text-xs">${esc(u.created_by || '\u2014')}</td>
                                    <td class="text-right">
                                        ${canChangeRole ? `<select class="input-field text-xs py-1 px-2" style="width:auto;" onchange="updateUserRole('${escAttr(u.username)}', this.value)">
                                            <option value="user" ${u.role === 'user' ? 'selected' : ''}>Kullan\u0131c\u0131</option>
                                            <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Y\u00f6netici</option>
                                        </select>` : ''}
                                    </td>
                                </tr>`;
                            }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>

                <div>
                    <div class="section-title">Yeni Kullan\u0131c\u0131 Olu\u015ftur</div>
                    <div class="card p-6">
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-600 mb-1">Kullan\u0131c\u0131 Ad\u0131</label>
                                <input class="input-field" id="new-username" placeholder="kullanici_adi">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-600 mb-1">G\u00f6r\u00fcnen Ad</label>
                                <input class="input-field" id="new-displayname" placeholder="Ahmet Y\u0131lmaz">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-600 mb-1">\u015eifre</label>
                                <input class="input-field" id="new-password" type="password" placeholder="En az 8 karakter, b\u00fcy\u00fck/k\u00fc\u00e7\u00fck harf ve rakam">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-600 mb-1">Rol</label>
                                <select class="input-field" id="new-role">
                                    <option value="user">Kullan\u0131c\u0131</option>
                                    <option value="admin">Y\u00f6netici</option>
                                </select>
                            </div>
                            <button class="btn-primary w-full" onclick="createUser()">Kullan\u0131c\u0131 Olu\u015ftur</button>
                            <div id="create-user-msg" class="hidden text-sm text-center"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>`;
    }

    async function createUser() {
        const username = document.getElementById('new-username').value.trim();
        const display_name = document.getElementById('new-displayname').value.trim();
        const password = document.getElementById('new-password').value;
        const role = document.getElementById('new-role').value;
        const msgDiv = document.getElementById('create-user-msg');

        const res = await api('/api/auth/register', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, display_name, password, role }),
        });

        msgDiv.classList.remove('hidden');
        if (res.success) {
            msgDiv.className = 'text-sm text-center text-brand-600';
            msgDiv.textContent = res.message;
            document.getElementById('new-username').value = '';
            document.getElementById('new-displayname').value = '';
            document.getElementById('new-password').value = '';
            setTimeout(() => renderAdmin(), 1000);
        } else {
            msgDiv.className = 'text-sm text-center text-danger-500';
            msgDiv.textContent = res.error;
        }
    }

    async function updateUserRole(username, role) {
        const res = await api('/api/users/update-role', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, role }),
        });
        if (res.error) alert(res.error);
    }

    async function approveUser(username) {
        if (!confirm(username + ' kullan\u0131c\u0131s\u0131n\u0131 onaylamak istedi\u011finize emin misiniz?')) return;
        const res = await api('/api/admin/approve-user', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username }) });
        if (res.success) renderAdmin();
        else alert(res.error || 'Bir sorun olu\u015ftu');
    }

    async function rejectUser(username) {
        if (!confirm(username + ' kullan\u0131c\u0131s\u0131n\u0131n ba\u015fvurusunu reddetmek istedi\u011finize emin misiniz?')) return;
        const res = await api('/api/admin/reject-user', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username }) });
        if (res.success) renderAdmin();
        else alert(res.error || 'Bir sorun olu\u015ftu');
    }

    // ══════════════════════════════════════════════════════════
    //  SETTINGS
    // ══════════════════════════════════════════════════════════
    async function renderSettings() {
        app().innerHTML = `
        <div class="fade-in max-w-lg mx-auto">
            <h1 class="text-3xl font-bold tracking-tight text-slate-900 mb-8">Hesap Ayarlar\u0131</h1>
            <div class="card p-6">
                <h3 class="font-semibold text-slate-800 mb-4">\u015eifre De\u011fi\u015ftir</h3>
                <div class="space-y-4">
                    <div><label class="block text-sm font-medium text-slate-600 mb-1">Mevcut \u015eifre</label><input class="input-field" id="old-pass" type="password"></div>
                    <div><label class="block text-sm font-medium text-slate-600 mb-1">Yeni \u015eifre</label><input class="input-field" id="new-pass" type="password" placeholder="En az 8 karakter, b\u00fcy\u00fck/k\u00fc\u00e7\u00fck harf ve rakam"></div>
                    <button class="btn-primary w-full" onclick="changePassword()">\u015eifreyi G\u00fcncelle</button>
                    <div id="pwd-msg" class="hidden text-sm text-center"></div>
                </div>
            </div>
        </div>`;
    }

    async function changePassword() {
        const old_password = document.getElementById('old-pass').value;
        const new_password = document.getElementById('new-pass').value;
        const msgDiv = document.getElementById('pwd-msg');
        const res = await api('/api/auth/change-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ old_password, new_password }) });
        msgDiv.classList.remove('hidden');
        if (res.success) { msgDiv.className = 'text-sm text-center text-brand-600'; msgDiv.textContent = res.message; }
        else { msgDiv.className = 'text-sm text-center text-danger-500'; msgDiv.textContent = res.error; }
    }

    // ══════════════════════════════════════════════════════════
    //  404
    // ══════════════════════════════════════════════════════════
    function renderNotFound() {
        app().innerHTML = `<div class="fade-in text-center py-20"><h1 class="text-2xl font-bold text-slate-800 mb-2">Sayfa Bulunamad\u0131</h1><p class="text-slate-500 mb-6">Arad\u0131\u011f\u0131n\u0131z sayfa mevcut de\u011fil.</p><button class="btn-primary" onclick="navigate('/')">Ana Sayfaya D\u00f6n</button></div>`;
    }
    </script>
</body>
</html>
